---
d_nikke_eh_01:
  d_nikke_eh_01_1:
    speaker: "<Narration>"
    en: "*Creeeak*"
    ko: 끼익-
    ja: キィ…
  d_nikke_eh_01_2:
    speaker: jackal
    en: Huh?! Commander!
    ko: 어?! 지휘관이다!
    ja: あれ！？指揮官だ！
  d_nikke_eh_01_3:
    speaker: jackal
    en: Viper! Viper! The Commander's here!
    ko: 바이퍼! 바이퍼! 여기 지휘관이 왔어!
    ja: バイパー！バイパー！指揮官が来たよ！
  d_nikke_eh_01_4:
    speaker: viper
    en: Oh my, Honey ♡ You're here?
    ko: 어머, 자기♡ 왔구나?
    ja: あら、ダーリン♡来たの？
  d_nikke_eh_01_5:
    speaker: "<Self>"
    en: Hey, you two. Long time no see.
    ko: 둘 다 오랜만이야.
    ja: 2人とも久しぶりだな
  d_nikke_eh_01_6:
    speaker: viper
    en: Hehe, I knew you'd show up!
    ko: 후후, 역시 자기라면 와줄 줄 알았어~
    ja: ふふ、ダーリンなら来てくれると思ってた～
  d_nikke_eh_01_7:
    speaker: viper
    en: By the way, are you doing okay?
    ko: 그나저나, 몸은 좀 괜찮아?
    ja: ところで、体は大丈夫？
  d_nikke_eh_01_8:
    speaker: viper
    en: After what happened last time...
    ko: 지난번에 그런 일을 겪었는데 말이야.
    ja: あんなことがあったから。
  d_nikke_eh_01_9:
    speaker: "<Self>"
    en: I'm okay, all things considered.
    ko: 뭐, 나름 멀쩡해.
    ja: なんとか無事だ
  d_nikke_eh_01_10:
    speaker: viper
    en: I'd expect nothing less from you, Honey ♡
    ko: 역시 우리 자기는 튼튼하네♡
    ja: さすがダーリン、丈夫だね♡
  d_nikke_eh_01_11:
    speaker: viper
    en: Getting bonked on the head must be child's play for a battle-hardened commander
      like you, right?
    ko: |-
      역전의 지휘관에게
      둔기로 머리를 얻어맞는 것쯤은 아무것도 아닌 건가?
    ja: |-
      凄腕の指揮官は
      鈍器で殴られたくらいじゃ
      どうってことないとか？
  d_nikke_eh_01_12:
    speaker: jackal
    en: Woooow! Commander, is your head made of stone or what?
    ko: 우와~ 지휘관, 돌머리야?
    ja: うわぁ～、指揮官って石頭なの？
  d_nikke_eh_01_13:
    speaker: jackal
    en: I'm so jealous! Can I bite it?
    ko: 부러워! 깨물어봐도 돼?!
    ja: いいなぁ！かじってみてもいい！？
  d_nikke_eh_01_14:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_01_15:
    speaker: viper
    en: Hehe, we're only teasing you, Honey!
    ko: 아핫, 농담이야 자기~
    ja: あはっ。ダーリンってば、冗談だよ～
  d_nikke_eh_01_16:
    speaker: viper
    en: You're way too fun to mess with ♡
    ko: 역시 자기 놀리는 게 제일 재밌다니까♡
    ja: |-
      やっぱりダーリンは一番
      からかいがいがあるね♡
  d_nikke_eh_01_17:
    speaker: "<Self>"
    en: So... why'd you call me over?
    ko: "…그래서, 오늘 나를 부른 이유가 뭐야?"
    ja: |-
      …それで、
      今日私を呼んだ理由はなんだ？
  d_nikke_eh_01_18:
    speaker: viper
    en: Oh, well...
    ko: 아아, 그거 말이지.
    ja: ああ、それなんだけど。
  d_nikke_eh_01_19:
    speaker: viper
    en: Hmm, it's nothing much...
    ko: 음~ 다른 건 아니고.
    ja: う～ん、実はね…
  d_nikke_eh_01_20:
    speaker: viper
    en: We're just getting something ready.
    ko: 우리가 준비하고 있는 게 있어서~
    ja: 今、準備してるコトがあるの～
  d_nikke_eh_01_21:
    speaker: "<Self>"
    en: What are you getting ready?
    ko: 뭘, 준비하는데?
    ja: 何の準備だ？
  d_nikke_eh_01_22:
    speaker: viper
    en: Well... you see—
    ko: 음… 그게 말이지.
    ja: えっと…
  d_nikke_eh_01_23:
    speaker: jackal
    en: Hehehe! I said we should throw a party!
    ko: 흐흥, 내가 파티하자고 했어!
    ja: へへへ、私がパーティーしようって言ったんだ！
  d_nikke_eh_01_24:
    speaker: jackal
    en: We're gonna set off fireworks and have sooo much fun!
    ko: 폭죽을 팡팡 터트리면서 신나게 놀 거야!
    ja: |-
      爆竹をバンバン鳴らしながら
      楽しく遊ぶの！
  d_nikke_eh_01_25:
    speaker: "<Self>"
    en: A party?
    ko: 파티?
    ja: パーティー？
  d_nikke_eh_01_26:
    speaker: "<Monologue>"
    en: I look around the room.
    ko: 방안을 둘러본다.
    ja: 部屋の中を見回した
  d_nikke_eh_01_27:
    speaker: "<Monologue>"
    en: Only then do I realize the place is festooned with signs and decorations.
    ko: 그제야 주위에 붙어있는 장식들과 문구가 눈에 들어온다.
    ja: |-
      そこで初めて
      周囲の装飾と文字が目に入った
  d_nikke_eh_01_28:
    speaker: "<Self>"
    en: '... "Welcome to Exotic"?'
    ko: "…[Welcome To Exotic] ?"
    ja: "…「Welcome To Exotic」？"
  d_nikke_eh_01_29:
    speaker: "<Self>"
    en: Is that for the new member...?
    ko: 이그조틱에 새로 들어온 멤버라면….
    ja: エキゾチックの新入りというと…
  d_nikke_eh_01_30:
    speaker: jackal
    en: Yeah, yeah! For our new Boss!
    ko: 응응! 우리 대장이야!
    ja: うん！うちの隊長のこと！
  d_nikke_eh_01_31:
    speaker: jackal
    en: We've never actually gotten to have fun with her before!
    ko: 우리 한 번도 대장이랑 재미있게 놀아본 적 없거든!
    ja: |-
      まだ一回も隊長と
      楽しく遊んだことないからさ！
  d_nikke_eh_01_32:
    speaker: jackal
    en: It's always work, work, work! I'm going nuts!
    ko: 맨날 일만 하니까 답답해!
    ja: |-
      いつも仕事ばっかしてて
      ストレス溜まってるだろうし！
  d_nikke_eh_01_33:
    speaker: viper
    en: "... She won't stop complaining!"
    ko: "…라고 하더라고~"
    ja: "…ってコトなの～"
  d_nikke_eh_01_34:
    speaker: viper
    en: So I thought about how to make a little meeting happen... and ta-da, this
      idea popped into my head!
    ko: 그래서 어떻게 하면 자리를 만들 수 있을까 하다가 생각해 낸 게….
    ja: |-
      で、どうすれば遊ぶ機会を作れるかなって
      考えてた時に思いついたのが…
  d_nikke_eh_01_35:
    speaker: "<Self>"
    en: Oh, so it's a welcome party.
    ko: 환영 파티인 거구나.
    ja: 歓迎パーティーか
  d_nikke_eh_01_36:
    speaker: viper
    en: That's right...
    ko: "…맞아."
    ja: "…そういうこと♡"
  d_nikke_eh_01_37:
    speaker: viper
    en: I've definitely caused my fair share of trouble before,
    ko: 알고 있겠지만, 나도 그동안 많이 속 썩이고 다녔거든.
    ja: |-
      知ってると思うけど、
      私もずいぶん迷惑かけてきちゃったから。
  d_nikke_eh_01_38:
    speaker: viper
    en: so think of this as my way of apologizing.
    ko: 그거에 대한 사과의 의미도 있구.
    ja: そのお詫びっていうのもあるし、
  d_nikke_eh_01_39:
    speaker: viper
    en: And maybe a chance for the three of us to really start over...
    ko: 우리 셋이서 제대로 시작해 보자~ 뭐, 이런 느낌도 있는 거지.
    ja: |-
      3人でこれから頑張ってこ～って
      意味もこめてね。
  d_nikke_eh_01_40:
    speaker: "<Self>"
    en: Sounds like a great idea.
    ko: 좋은 생각인 거 같아.
    ja: いいアイデアだと思う
  d_nikke_eh_01_41:
    speaker: "<Self>"
    en: But why'd you call me? Am I just here to celebrate with you guys?
    ko: |-
      그런데 나를 부른 이유는 뭐야?
      같이 축하해 주면 되는 건가?
    ja: 私は一緒に祝えばいいのか？
  d_nikke_eh_01_42:
    speaker: viper
    en: Hmm... that's not exactly wrong.
    ko: 음~ 그것도 틀린 말은 아닌데.
    ja: えっと～、それも間違いじゃないんだけど、
  d_nikke_eh_01_43:
    speaker: viper
    en: But as you can see, it'll take forever for just the two of us to get everything
      ready.
    ko: |-
      보다시피 우리 둘이 준비하기엔
      시간이 부족할 거 같아서 말이지.
    ja: |-
      見ての通り、私たち2人だけじゃ
      準備に時間がかかりすぎるでしょ？
  d_nikke_eh_01_44:
    speaker: viper
    en: So we thought, why not ask you for a little help, and maybe get to see your
      face too.
    ko: |-
      그래서 겸사겸사 도움도 받을 겸,
      자기 얼굴도 볼 겸해서 부른 거야.
    ja: |-
      せっかくだし手伝ってもらうついでに
      ダーリンの顔も見たいな～と思って呼んだの。
  d_nikke_eh_01_45:
    speaker: viper
    en: And like you said, you can celebrate with us, so that's a win-win, right?
    ko: |-
      방금 자기가 말한 것처럼
      같이 축하해 줄 수도 있으니 일석이조 아닐까?
    ja: |-
      それでみんなで一緒に祝ったら、
      一石二鳥じゃない？
  d_nikke_eh_01_46:
    speaker: "<Self>"
    en: Sure, I'd be happy to help.
    ko: 그렇다면 기꺼이 도와줘야지.
    ja: それなら喜んで手伝おう
  d_nikke_eh_01_47:
    speaker: viper
    en: Hehe, I knew you'd say that ♡
    ko: 아핫, 역시 자기라면 그렇게 말할줄 알았어♡
    ja: あはっ、そうこなくっちゃ♡
  d_nikke_eh_01_48:
    speaker: jackal
    en: Commander! Commander! Look!
    ko: 지휘관! 지휘관! 여기 좀 봐줘!
    ja: 指揮官！指揮官！これ手伝って！
  d_nikke_eh_01_49:
    speaker: jackal
    en: The balloons won't stop popping! Uggh... It's so annoying!
    ko: 풍선이 계속 터져! 으으… 답답해!
    ja: |-
      何回やっても風船が割れちゃうの！
      ううっ…イライラする！
  d_nikke_eh_01_50:
    speaker: viper
    en: Hehe, we'll be counting on you!
    ko: 후후, 그럼 잘 부탁할게?
    ja: ふふ。じゃ、よろしくね♡
  d_nikke_eh_01_51:
    speaker: "<Monologue>"
    en: I start getting the party ready with Jackal and Viper,
    ko: 그렇게 나는 자칼, 바이퍼와 함께 파티 준비를 시작했고
    ja: |-
      こうしてジャッカルとバイパーと
      一緒にパーティーの準備を始めた
  d_nikke_eh_01_52:
    speaker: "<Monologue>"
    en: and before I know it, we're already putting the finishing touches on everything.
    ko: 어느덧 시간은 흘러 마무리 단계에 접어들었다.
    ja: |-
      あっという間に時間は過ぎ、
      仕上げの段階に入った
  d_nikke_eh_01_53:
    speaker: "<Self>"
    en: Whew... that should do it, right?
    ko: 휴우… 이쯤이면 괜찮겠지?
    ja: ふぅ…これで問題ないか？
  d_nikke_eh_01_54:
    speaker: jackal
    en: Wooow, it's all so sparkly!
    ko: 우와~ 반짝반짝해!
    ja: うわぁ～！キラキラ！
  d_nikke_eh_01_55:
    speaker: jackal
    en: Think this'll surprise her?
    ko: 이렇게 하면 정말 대장을 깜짝 놀랠 수 있는 거야?!
    ja: これで隊長をビックリさせられるの！？
  d_nikke_eh_01_56:
    speaker: viper
    en: Of course! She might be so surprised that she sheds tears of joy.
    ko: 그럼~ 깜짝 놀라서 감동의 눈물을 흘릴지도?
    ja: もちろん♡嬉しくて泣いちゃうかもね？
  d_nikke_eh_01_57:
    speaker: jackal
    en: Hehe, I'm so excited! I hope Boss comes back soon!
    ko: 흐흥, 기대돼! 빨리 대장이 왔으면 좋겠어!
    ja: へへへ、楽しみ！早く隊長来ないかな！
  d_nikke_eh_01_58:
    speaker: viper
    en: Thanks for helping out, Honey.
    ko: 자기도 고생 많았어~
    ja: ダーリンもお疲れ様～
  d_nikke_eh_01_59:
    speaker: viper
    en: Once you pitched in, it was done in no time.
    ko: 자기 손이 보태지니까 순식간에 끝나버렸네.
    ja: |-
      ダーリンが手伝ってくれたから
      すぐに終わっちゃったね。
  d_nikke_eh_01_60:
    speaker: viper
    en: Calling you was definitely the right move ♡
    ko: 역시 부르길 잘했어♡
    ja: やっぱり呼んで正解だった♡
  d_nikke_eh_01_61:
    speaker: viper
    en: Right, Jackal?
    ko: 그치, 자칼?
    ja: でしょ、ジャッカル？
  d_nikke_eh_01_62:
    speaker: jackal
    en: Yup, yup!
    ko: 응응!
    ja: うんうん！
  d_nikke_eh_01_63:
    speaker: jackal
    en: Commander's awesome! Just WHOOSH! SWOOSH! And bam, it's done!
    ko: 지휘관 대단해! 쓱싹쓱싹하니까 순식간에 끝났어!
    ja: 指揮官、すごいよ！一瞬で終わっちゃったもん！
  d_nikke_eh_01_64:
    speaker: "<Self>"
    en: Glad to help.
    ko: 그렇다면 다행이네.
    ja: 役に立てたならよかった
  d_nikke_eh_01_65:
    speaker: jackal
    en: Oh, right!
    ko: 아, 맞다 맞다!
    ja: あっ、そうだ！
  d_nikke_eh_01_66:
    speaker: jackal
    en: I almost forgot I actually prepared something!
    ko: 나 준비한 게 있었는데 까먹었어!
    ja: アレ、持ってきてたの忘れてた！
  d_nikke_eh_01_67:
    speaker: "<Narration>"
    en: "*Rustle, rustle*"
    ko: 부스럭- 부스럭-
    ja: ガサゴソ…
  d_nikke_eh_01_68:
    speaker: jackal
    en: Ta-da!
    ko: 짜잔-!
    ja: ジャジャーン！
  d_nikke_eh_01_69:
    speaker: "<Self>"
    en: What's this?
    ko: 이게 뭐야?
    ja: これは…？
  d_nikke_eh_01_70:
    speaker: jackal
    en: Hehe, isn't it cute? It's my favorite bone!
    ko: 흐흥, 이쁘지! 내가 제일 아끼는 뼈다귀야!
    ja: |-
      へへへ、かわいいでしょ！
      私が一番大事にしてる骨だよ！
  d_nikke_eh_01_71:
    speaker: jackal
    en: Viper said we need a present for the party,
    ko: 바이퍼가 파티라면 선물이 있어야 한댔잖아!
    ja: |-
      パーティーにはプレゼントが必要って
      バイパーが言ってたじゃん！
  d_nikke_eh_01_72:
    speaker: jackal
    en: so I prepared this!
    ko: 그래서 준비했어!
    ja: だから、持ってきた！
  d_nikke_eh_01_73:
    speaker: "<Self>"
    en: "!"
    ko: "!"
    ja: "！"
  d_nikke_eh_01_74:
    speaker: viper
    en: "!"
    ko: "!"
    ja: "！"
  d_nikke_eh_01_75:
    speaker: viper
    en: Wow, I was so busy preparing for the party that I totally forgot.
    ko: 우와… 파티 준비한다고 까맣게 잊고 있었어.
    ja: |-
      あちゃ～
      …パーティーの準備ですっかり忘れてた。
  d_nikke_eh_01_76:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_01_77:
    speaker: "<Self>"
    en: It's probably too late to get one now.
    ko: 아무래도 지금 구하긴 조금 늦었겠지?
    ja: |-
      今から買いに行っても
      間に合わないか？
  d_nikke_eh_01_78:
    speaker: viper
    en: Yeah, I guess so...
    ko: 그럴 거 같은데….
    ja: うん…
  d_nikke_eh_01_79:
    speaker: viper
    en: And Boss should be back any minute.
    ko: 곧 리더가 돌아올 시간이기도 하고.
    ja: もうすぐリーダーが来る時間だし。
  d_nikke_eh_01_80:
    speaker: viper
    en: Hmm...
    ko: 흐음~
    ja: う～ん。
  d_nikke_eh_01_81:
    speaker: viper
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_01_82:
    speaker: viper
    en: Wait, I got it!
    ko: 아, 그러면 되겠다.
    ja: あっ、そうだ。
  d_nikke_eh_01_83:
    speaker: viper
    en: While you keep her busy, Jackal and I can go grab another gift.
    ko: 자기가 시간을 끌어주는 동안, 우리가 선물을 구해오는 거야.
    ja: |-
      ダーリンが時間を稼いでる間に
      私たちがプレゼントを買ってくるの。
  d_nikke_eh_01_84:
    speaker: viper
    en: And hey, you can try to find out what she's into and let us know.
    ko: 겸사겸사 리더가 뭘 좋아하는지 알아내서 연락해 주면 되지 않을까?
    ja: |-
      その時にリーダーの好みを聞きだして
      連絡を取り合えばよくない？
  d_nikke_eh_01_85:
    speaker: viper
    en: If you spend some time with her... I'm sure you'll pick up a thing or two.
    ko: 리더랑 같이 다니다 보면… 뭔가 알 수 있을 테니까.
    ja: |-
      リーダーと一緒にいれば
      分かることもあるだろうし～
  d_nikke_eh_01_86:
    speaker: viper
    en: What do you think? Pretty clever plan, huh?
    ko: 어때? 괜찮은 제안이지?
    ja: どう？いいアイデアでしょ？
  d_nikke_eh_01_87:
    speaker: "<Self>"
    en: That could work.
    ko: 나쁘지 않네.
    ja: ああ、悪くないな
  d_nikke_eh_01_88:
    speaker: viper
    en: Hehe. I know, right?
    ko: 후후, 그렇지?
    ja: ふふ、だよね？
  d_nikke_eh_01_89:
    speaker: viper
    en: Okay then, Honey, we should—
    ko: 그럼 자기는 지금부터-
    ja: じゃあ、ダーリンは今から…
  d_nikke_eh_01_90:
    speaker: "<Narration>"
    en: "*Click, click*"
    ko: 철컥- 철컥-
    ja: ガチャ、ガチャ…
  d_nikke_eh_01_91:
    speaker: "<Narration>"
    en: "*Click, click, click*"
    ko: 철컥- 철컥- 철컥-
    ja: ガチャ、ガチャ、ガチャ…
  d_nikke_eh_01_92:
    speaker: "<Narration>"
    en: "*Thud, thud, thud*"
    ko: 쿵쿵쿵-
    ja: ドンドンドン…
  d_nikke_eh_01_93:
    speaker: eh_n
    en: "... Why's the door locked?"
    ko: "…문이 왜 잠겨있는 거지?"
    ja: "…鍵がかかってる？"
  d_nikke_eh_01_94:
    speaker: "<Narration>"
    en: "*Thud, thud, thud*"
    ko: 쿵쿵쿵-
    ja: ドンドンドン…
  d_nikke_eh_01_95:
    speaker: eh_n
    en: Viper, Jackal,
    ko: 바이퍼, 자칼.
    ja: ジャッカル、バイパー。
  d_nikke_eh_01_96:
    speaker: eh_n
    en: are you in there?
    ko: 안에 있는 거야?
    ja: 中にいる？
  d_nikke_eh_01_97:
    speaker: "<Narration>"
    en: "*Click, click*"
    ko: 철컥- 철컥-
    ja: ガチャ、ガチャ…
  d_nikke_eh_01_98:
    speaker: viper
    en: "... Looks like she's already here."
    ko: "…벌써 와버렸나 본데?"
    ja: "…もう来ちゃったみたいね？"
  d_nikke_eh_01_99:
    speaker: viper
    en: Sorry to dump this on you, hehe,
    ko: 후후, 좀 갑작스럽긴 하지만….
    ja: ふふ、ちょっと急なんだけど…
  d_nikke_eh_01_100:
    speaker: viper
    en: but we're counting on you!
    ko: 잘 부탁할게?
    ja: 後は、よろしくね♡
  d_nikke_eh_01_101:
    speaker: jackal
    en: Heheh, good luck, Commander!
    ko: 흐흥, 잘 다녀와! 지휘관!
    ja: へへへ、いってらっしゃい！指揮官！
  d_nikke_eh_01_102:
    speaker: jackal
    en: Don't take too long! We'll be waiting for your message!
    ko: 기다리고 있을게!
    ja: 連絡待ってるからね！
  d_nikke_eh_01_103:
    speaker: "<Narration>"
    en: "*Thud, thud, thud*"
    ko: 쿵쿵쿵-
    ja: ドンドンドン…
  d_nikke_eh_01_104:
    speaker: "<Self>"
    en: J-just a sec... I'll be right out!
    ko: 자, 잠깐만… 금방 나갈게!
    ja: |-
      ちょ、ちょっと待て…
      今、行く！
d_nikke_eh_02:
  d_nikke_eh_02_1:
    speaker: "<Narration>"
    en: "*Creeeak*"
    ko: 끼이익-
    ja: キィィ…
  d_nikke_eh_02_2:
    speaker: eh_n
    en: "@UserName...?"
    ko: "@UserName…?"
    ja: "@UserName…？"
  d_nikke_eh_02_3:
    speaker: eh_n
    en: What are you doing here?
    ko: 네가 왜 여기에….
    ja: どうしてお前がここに…
  d_nikke_eh_02_4:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_5:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_6:
    speaker: eh_n
    en: Can you explain
    ko: 설명해 줄 수 있을까?
    ja: 説明してくれる？
  d_nikke_eh_02_7:
    speaker: eh_n
    en: why my door was locked, and of all people, why it's you coming out of it?
    ko: |-
      왜 거처의 문이 잠겨있던 것이며,
      그리고 왜 거기서 네가 튀어나온 건지.
    ja: |-
      なぜドアに鍵がかかっていたのか、
      それに、なぜ部屋からお前が
      飛び出してきたのか。
  d_nikke_eh_02_8:
    speaker: "<Self>"
    en: Oh, it's nothing, really...
    ko: 아, 다른 건 아니고….
    ja: ああ、そのことだが…
  d_nikke_eh_02_9:
    speaker: "<Self>"
    en: I just swung by to see you.
    ko: 너를 찾아왔거든.
    ja: 君を探しにきたんだ
  d_nikke_eh_02_10:
    speaker: eh_n
    en: Me?
    ko: 나를?
    ja: 私を？
  d_nikke_eh_02_11:
    speaker: eh_n
    en: What for?
    ko: 무슨 일로?
    ja: 何の用で？
  d_nikke_eh_02_12:
    speaker: "<Self>"
    en: Uh...
    ko: 그게….
    ja: それは…
  d_nikke_eh_02_13:
    speaker: "<Monologue>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_14:
    speaker: "<Monologue>"
    en: I can't think of an excuse.
    ko: 핑곗거리가 생각나지 않는다.
    ja: |-
      この場をしのげそうな
      言い訳が思いつかない
  d_nikke_eh_02_15:
    speaker: "<Self>"
    en: Oh, yeah!
    ko: 아… 그래!
    ja: ええと…そうだ！
  d_nikke_eh_02_16:
    speaker: "<Self>"
    en: I'm here for our counseling session.
    ko: 너랑 상담을 하려 왔어.
    ja: 君と面談するために来た
  d_nikke_eh_02_17:
    speaker: eh_n
    en: "?"
    ko: "?"
    ja: "？"
  d_nikke_eh_02_18:
    speaker: eh_n
    en: Didn't we have one recently?
    ko: 상담은 얼마 전에 하지 않았어?
    ja: 面談なら、この前しなかった？
  d_nikke_eh_02_19:
    speaker: "<Monologue>"
    en: Did we...?
    ko: 그랬었나…?
    ja: そうだったか…？
  d_nikke_eh_02_20:
    speaker: "<Self>"
    en: Uh... it's just a follow-up.
    ko: "…상담의 연장선이야."
    ja: "…面談の続きだ"
  d_nikke_eh_02_21:
    speaker: "<Self>"
    en: The Central Government recently sent a notice asking us to find out what the
      Nikkes under our care like.
    ko: |-
      얼마 전에 중앙정부의 공문이 내려왔거든,
      담당 니케들의 선호하는 것에 대한 조사를 해달라고.
    ja: |-
      先日、中央政府から担当するニケの
      好みを調査するよう指示があってな
  d_nikke_eh_02_22:
    speaker: "<Monologue>"
    en: I tell a pretty convincing lie.
    ko: 라고 그럴듯한 거짓말을 해 버렸다.
    ja: と、それらしい嘘をついた
  d_nikke_eh_02_23:
    speaker: eh_n
    en: "... Is that so?"
    ko: "…그래?"
    ja: "…そうなの？"
  d_nikke_eh_02_24:
    speaker: "<Self>"
    en: Yeah, it's important for a commander to keep an eye on their Nikkes' condition.
    ko: 응, 지휘관에게 니케의 컨디션 관리는 중요하니까.
    ja: |-
      ああ、指揮官はニケについて
      何でも知っておくべきなんだ
  d_nikke_eh_02_25:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_26:
    speaker: "<Monologue>"
    en: E.H.'s sharp gaze pierces straight through me.
    ko: E.H.의 날카로운 눈빛이 가슴에 직격으로 박힌다.
    ja: E.H.の鋭い視線が突き刺さる
  d_nikke_eh_02_27:
    speaker: eh_n
    en: "... So commanders really get involved in things like that, huh? I never knew
      that."
    ko: "…지휘관들은 그런 일까지 하는구나. 몰랐어."
    ja: "…指揮官には、そういう仕事もあるのね。"
  d_nikke_eh_02_28:
    speaker: eh_n
    en: Now that I'm a Nikke, I guess I have no choice but to cooperate.
    ko: 나도 니케가 된 이상 너에게 협조해야겠지.
    ja: |-
      私もニケになったからには
      協力しないと。
  d_nikke_eh_02_29:
    speaker: eh_n
    en: What do you need me to do?
    ko: 내가 어떻게 도와주면 될까?
    ja: それで、何をすればいい？
  d_nikke_eh_02_30:
    speaker: "<Monologue>"
    en: Luckily, E.H. buys what I'm saying, so our conversation carries on.
    ko: 다행히 E.H.는 나의 이야기에 납득했고, 대화를 이어 나갈 수 있었다.
    ja: 幸い、E.H.は納得してくれたようだ
  d_nikke_eh_02_31:
    speaker: eh_n
    en: Hmm... so you want me to tell you about what I like, is that it?
    ko: 음… 좋아하는 걸 말해달라고?
    ja: ふむ…好きなものを言えばいいの？
  d_nikke_eh_02_32:
    speaker: "<Self>"
    en: Yeah, anything you want to talk about,
    ko: 응, 뭐든 좋아.
    ja: ああ、何でも構わない
  d_nikke_eh_02_33:
    speaker: "<Self>"
    en: like your favorite foods, or hobbies.
    ko: 평소에 먹는 거라던가, 취미 생활이라던가.
    ja: |-
      普段、食べているものでも
      趣味でも何でもいい
  d_nikke_eh_02_34:
    speaker: eh_n
    en: Food-wise...
    ko: 먹는 것이라면….
    ja: 食べものなら…
  d_nikke_eh_02_35:
    speaker: eh_n
    en: I mostly stick to Splendamin MREs.
    ko: 평소에 유통기한이 넉넉한 군용 퍼팩트 바를 먹고 있어.
    ja: |-
      普段は消費期限の長い
      軍用パーフェクトバーを食べてる。
  d_nikke_eh_02_36:
    speaker: "<Self>"
    en: Splendamin MREs...? The ones that're completely tasteless and super dry...?
    ko: |-
      군용 퍼팩트라면…
      그 아무 맛도 안 나고 퍽퍽하기만 한…?
    ja: |-
      軍用パーフェクト…
      あの無味でパサパサした…？
  d_nikke_eh_02_37:
    speaker: eh_n
    en: Yeah,
    ko: 맞아.
    ja: ええ。
  d_nikke_eh_02_38:
    speaker: eh_n
    en: that's enough to get by.
    ko: 그것만 먹어도 활동하는 데에는 문제없거든.
    ja: あれだけで、問題なく体を動かせるから。
  d_nikke_eh_02_39:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_40:
    speaker: "<Self>"
    en: Then do you have any hobbies?
    ko: 그럼, 취미 생활은 있어?
    ja: 趣味などはないのか？
  d_nikke_eh_02_41:
    speaker: eh_n
    en: Hobbies...? Can't say that I do.
    ko: 취미라… 글쎄.
    ja: 趣味…そうね。
  d_nikke_eh_02_42:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_43:
    speaker: eh_n
    en: Oh, that reminds me.
    ko: 아, 떠올랐다.
    ja: ああ、そう言われれば…
  d_nikke_eh_02_44:
    speaker: eh_n
    en: Whenever I've got some free time, I make sure to maintain my equipment.
    ko: 시간이 남을 때마다 장비 손질을 하고 있어.
    ja: 空き時間があれば装備の手入れをしている。
  d_nikke_eh_02_45:
    speaker: eh_n
    en: Can't afford to be caught off guard when things go south.
    ko: 비상시에 빠르게 대응할 수 있어야 하니까.
    ja: 非常時でも素早く対応できるように。
  d_nikke_eh_02_46:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_47:
    speaker: "<Monologue>"
    en: The more questions I ask, the more E.H. talks about what she's expected to
      do professionally rather than what she wants to do.
    ko: |-
      질문이 이어질 수록
      E.H.는 [원하는 것] 대신 [해야 할 일]에 대해 이야기했다.
    ja: |-
      E.H.は私の質問に、
      「好きなもの」ではなく
      「すべきこと」について答えた
  d_nikke_eh_02_48:
    speaker: "<Self>"
    en: What kind of music do you like?
    ko: 좋아하는 음악 같은 건 있어?
    ja: 好きな音楽は？
  d_nikke_eh_02_49:
    speaker: eh_n
    en: I don't really listen to music.
    ko: 음악은 잘 듣지 않아.
    ja: 音楽は聞かないの。
  d_nikke_eh_02_50:
    speaker: "<Self>"
    en: What do you do when you're stressed?
    ko: 그럼 스트레스받을 땐 뭐해?
    ja: では、ストレス解消法は？
  d_nikke_eh_02_51:
    speaker: eh_n
    en: I sleep.
    ko: 잠을 자.
    ja: 寝る。
  d_nikke_eh_02_52:
    speaker: "<Self>"
    en: "... I see."
    ko: 그렇구나….
    ja: そうか…
  d_nikke_eh_02_53:
    speaker: eh_n
    en: That look on you...
    ko: "…표정이 뭔가 미묘한데."
    ja: "…何か言いたげな表情ね。"
  d_nikke_eh_02_54:
    speaker: eh_n
    en: My answer didn't sit well with you?
    ko: 대답이 마음에 안 드는 거야?
    ja: この答えじゃ納得いかない？
  d_nikke_eh_02_55:
    speaker: "<Self>"
    en: "... Okay, let me rephrase my question."
    ko: "…좋아, 그러면 질문을 바꿔볼게."
    ja: "…では、質問の仕方を変えてみよう"
  d_nikke_eh_02_56:
    speaker: "<Self>"
    en: Is there anything you've ever wanted to try?
    ko: 이때까지 해보고 싶었던 것들은 없어?
    ja: 人生でやってみたかったことは？
  d_nikke_eh_02_57:
    speaker: eh_n
    en: Things I wanted to try?
    ko: 해보고 싶었던 것?
    ja: やってみたかったこと？
  d_nikke_eh_02_58:
    speaker: eh_n
    en: Honestly... I never really gave it much thought.
    ko: 글쎄… 딱히 생각해 본 적 없는 것 같아.
    ja: 何だろう…特に考えたことがなかった。
  d_nikke_eh_02_59:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_60:
    speaker: eh_n
    en: Hmm...
    ko: 음, 그렇네.
    ja: ああ、そういうことか。
  d_nikke_eh_02_61:
    speaker: eh_n
    en: I don't think there's anything I really like.
    ko: 나 좋아하는 게 없는 거 같아.
    ja: 私って、好きなものがないんだ。
  d_nikke_eh_02_62:
    speaker: eh_n
    en: Maybe it's because I'm from a place that had nothing to offer.
    ko: 어쩌면 오락거리랄 것도 없는 환경의 영향을 받았을지도 모르겠어.
    ja: |-
      娯楽と呼べるようなもののない世界で
      生きてきたせいかもしれないけど。
  d_nikke_eh_02_63:
    speaker: "<Self>"
    en: But Viper and Jackal have hobbies.
    ko: 그렇다기엔 바이퍼랑 자칼도 취미를 가지고 있잖아.
    ja: |-
      だが、バイパーとジャッカルには
      趣味がある
  d_nikke_eh_02_64:
    speaker: eh_n
    en: "... Yeah, I guess."
    ko: "…그렇긴 하네."
    ja: "…確かにそうね。"
  d_nikke_eh_02_65:
    speaker: eh_n
    en: I've always been focused on something,
    ko: 항상 무언가에 몰두하고 있긴 했었지만.
    ja: いつも何かに没頭して生きてきたけど、
  d_nikke_eh_02_66:
    speaker: eh_n
    en: but that's probably not the answer you're looking for.
    ko: 그게 네가 원하는 대답은 아니지 않을까 싶어.
    ja: それはお前の望む答えじゃなさそう。
  d_nikke_eh_02_67:
    speaker: "<Self>"
    en: Hmm...
    ko: 음….
    ja: ふむ…
  d_nikke_eh_02_68:
    speaker: viper
    en: Wait, I got it!
    ko: 아, 그러면 되겠다.
    ja: あっ、そうだ。
  d_nikke_eh_02_69:
    speaker: viper
    en: While you keep her busy, Jackal and I can go grab another gift.
    ko: 자기가 시간을 끌어주는 동안, 내가 선물을 구해오는 거야.
    ja: |-
      ダーリンが時間を稼いでる間に
      私たちがプレゼントを買ってくるの。
  d_nikke_eh_02_70:
    speaker: viper
    en: And hey, you can try to find out what she's into and let us know.
    ko: 겸사겸사 리더가 뭘 좋아하는지 알아내서 연락해 주면 되지 않을까?
    ja: |-
      その時にリーダーの好みを聞きだして
      連絡を取り合えばよくない？
  d_nikke_eh_02_71:
    speaker: viper
    en: If you spend some time with her... I'm sure you'll pick up a thing or two.
    ko: 리더랑 같이 다니다 보면… 뭔가 알 수 있을 테니까.
    ja: |-
      リーダーと一緒にいれば
      分かることもあるだろうし～
  d_nikke_eh_02_72:
    speaker: viper
    en: What do you think? Pretty clever plan, huh?
    ko: 어때? 괜찮은 제안이지?
    ja: どう？いいアイデアでしょ？
  d_nikke_eh_02_73:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_02_74:
    speaker: "<Self>"
    en: How about you take me through a typical day for you?
    ko: 그럼 오늘 E.H.의 하루를 나에게 보여줄 수 있어?
    ja: |-
      今日一日、E.H.がどう過ごしているのか
      見せてくれないか？
  d_nikke_eh_02_75:
    speaker: eh_n
    en: A typical day for me?
    ko: 나의 하루?
    ja: どう過ごしているか？
  d_nikke_eh_02_76:
    speaker: "<Self>"
    en: Yeah, I figured seeing it for myself would give me a better idea.
    ko: 응, 직접 보다 보면 느낄 수 있지 않을까 해서.
    ja: |-
      ああ、隣で見ていれば
      分かることがあるかもしれない
  d_nikke_eh_02_77:
    speaker: eh_n
    en: "... All right."
    ko: "…그렇구나."
    ja: "…なるほど。"
  d_nikke_eh_02_78:
    speaker: eh_n
    en: It's nothing much, but if you think it'll help, I'll do it.
    ko: 별거 없겠지만… 그게 너에게 도움이 된다면 그렇게 할게.
    ja: |-
      特別なことはないと思うけど…
      お前の役に立つならそうしよう。
  d_nikke_eh_02_79:
    speaker: "<Narration>"
    en: E.H. steps forward, her footsteps light against the floor.
    ko: 저벅- 저벅-
    ja: スタスタ…
  d_nikke_eh_02_80:
    speaker: eh_n
    en: Follow me.
    ko: 그럼, 가자.
    ja: では、行こう。
  d_nikke_eh_02_81:
    speaker: eh_n
    en: I'll show you what a typical day's like for me.
    ko: 보여줄게. 내 일상을.
    ja: 見せてあげる、私の日常を。
d_nikke_eh_03:
  d_nikke_eh_03_1:
    speaker: "<Narration>"
    en: E.H. moves quickly, her strides cutting through the quiet of the Outer Rim.
    ko: 저벅- 저벅-
    ja: スタスタ…
  d_nikke_eh_03_2:
    speaker: "<Monologue>"
    en: I follow close behind, trying to keep up.
    ko: 나는 바쁘게 걷는 E.H.를 따라 아우터 림의 깊숙한 곳으로 이동했다.
    ja: |-
      私は足早に歩くE.H.について、
      アウターリムの奥深くへ移動した
  d_nikke_eh_03_3:
    speaker: "<Monologue>"
    en: The deeper we go, the fainter the light becomes,
    ko: 깊은 곳으로 이동할 수록 빛은 점점 옅어졌고.
    ja: |-
      奥へ進むにつれ
      明かりは次第に薄れていき
  d_nikke_eh_03_4:
    speaker: "<Monologue>"
    en: until soon, darkness swallows everything around us.
    ko: 어느새 칠흑 같은 어둠만이 주변에 깔렸다.
    ja: |-
      いつの間にか
      漆黒の暗闇に包まれた
  d_nikke_eh_03_5:
    speaker: "<Self>"
    en: It's really dark.
    ko: 너무 어두운데.
    ja: 暗すぎて何も見えない
  d_nikke_eh_03_6:
    speaker: eh_n
    en: Let your eyes adjust to the darkness.
    ko: 암순응하려고 노력해 봐.
    ja: そのうち慣れる。
  d_nikke_eh_03_7:
    speaker: eh_n
    en: You'll start to make out what's around soon enough.
    ko: 그럼, 주변이 천천히 보이기 시작할 거야.
    ja: だんだん周りが見えてくるから。
  d_nikke_eh_03_8:
    speaker: "<Self>"
    en: "... Got it."
    ko: "…알겠어."
    ja: "…分かった"
  d_nikke_eh_03_9:
    speaker: "<Monologue>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_03_10:
    speaker: "<Self>"
    en: E.H.
    ko: E.H.
    ja: E.H.
  d_nikke_eh_03_11:
    speaker: eh_n
    en: Yes?
    ko: 무슨 일이지?
    ja: どうしたの？
  d_nikke_eh_03_12:
    speaker: "<Self>"
    en: I still can't see a thing.
    ko: 여전히 똑같은 거 같아.
    ja: さっきと何も変わらない
  d_nikke_eh_03_13:
    speaker: eh_n
    en: "... I see."
    ko: "…그렇구나."
    ja: "…そう。"
  d_nikke_eh_03_14:
    speaker: eh_n
    en: It can't be helped if you're not used to it.
    ko: 익숙하지 않으면 어쩔 수 없지.
    ja: 慣れてないのだから仕方がない。
  d_nikke_eh_03_15:
    speaker: eh_n
    en: Hold on for a second.
    ko: 그럼, 잠시 날 붙잡고 있어.
    ja: しばらく私のそばを離れないで。
  d_nikke_eh_03_16:
    speaker: eh_n
    en: I'll take care of it.
    ko: 금방 해결할게.
    ja: 何とかする。
  d_nikke_eh_03_17:
    speaker: "<Self>"
    en: Okay...
    ko: "…그래."
    ja: "…分かった"
  d_nikke_eh_03_18:
    speaker: "<Narration>"
    en: E.H. rummages through her things in the dark until her fingers close around
      a flashlight.
    ko: 뒤적- 뒤적-
    ja: ゴソゴソ
  d_nikke_eh_03_19:
    speaker: "<Narration>"
    en: A soft click and it flickers to life.
    ko: 찰칵-
    ja: カチャッ
  d_nikke_eh_03_20:
    speaker: eh_n
    en: I switched on the flashlight.
    ko: 라이트를 켰어.
    ja: ライトをつけた。
  d_nikke_eh_03_21:
    speaker: eh_n
    en: Better?
    ko: 이제 좀 괜찮아?
    ja: 少しは見えるようになった？
  d_nikke_eh_03_22:
    speaker: "<Self>"
    en: Yeah, much better.
    ko: 응, 이제 살 거 같아.
    ja: ああ、よく見える
  d_nikke_eh_03_23:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_03_24:
    speaker: eh_n
    en: Looks like the streetlights around here are out.
    ko: 이 주변의 전등이 나갔네.
    ja: この辺りの電灯は切れてるようね。
  d_nikke_eh_03_25:
    speaker: eh_n
    en: I'll have to fix it.
    ko: 고쳐야겠어.
    ja: 交換しないと。
  d_nikke_eh_03_26:
    speaker: eh_n
    en: "@UserName, can you give me a hand?"
    ko: "@UserName, 좀 도와줄래?"
    ja: "@UserName、手伝ってくれる？"
  d_nikke_eh_03_27:
    speaker: "<Self>"
    en: Sure.
    ko: 알겠어.
    ja: 分かった
  d_nikke_eh_03_28:
    speaker: "<Narration>"
    en: A little while later...
    ko: 잠시 후.
    ja: しばらくして
  d_nikke_eh_03_29:
    speaker: "<Narration>"
    en: The wires crackle and spark,
    ko: 파지직- 파직-!
    ja: パチ、パチチッ！
  d_nikke_eh_03_30:
    speaker: "<Narration>"
    en: the light flickering erratically.
    ko: 깜빡- 깜빡-
    ja: チカ…チカ…
  d_nikke_eh_03_31:
    speaker: "<Narration>"
    en: Before long,
    ko: 지잉-
    ja: ジジジ…
  d_nikke_eh_03_32:
    speaker: "<Monologue>"
    en: the harsh buzzing begins to fade, and a soft glow slowly spreads around us.
    ko: |-
      어느새 사납던 전선의 소음이 잦아들고
      주변에 온화한 빛이 퍼져나가기 시작했다.
    ja: |-
      気づけば荒々しい電線の音も収まり
      周辺に柔らかな光が広がっていた
  d_nikke_eh_03_33:
    speaker: eh_n
    en: Whew...
    ko: 후-
    ja: ふぅ…
  d_nikke_eh_03_34:
    speaker: eh_n
    en: That'll have to do.
    ko: 이쯤이면 되겠어.
    ja: これでよさそう。
  d_nikke_eh_03_35:
    speaker: "<Self>"
    en: That's much better. It's a lot brighter now.
    ko: 한결 낫네, 훨씬 밝아졌어.
    ja: |-
      さっきよりずっとマシだ。
      だいぶ明るくなった
  d_nikke_eh_03_36:
    speaker: eh_n
    en: That's a relief.
    ko: 그렇다면 다행이야.
    ja: ならよかった。
  d_nikke_eh_03_37:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_03_38:
    speaker: eh_n
    en: If you wander the Outer Rim long enough, you'll stumble across places like
      this.
    ko: |-
      아우터 림에서 돌아다니다 보면
      종종 이런 곳을 발견할 때가 있어.
    ja: |-
      アウターリムを歩いてると
      たまにこういうところを見つけるの。
  d_nikke_eh_03_39:
    speaker: eh_n
    en: The farther you are from the Ark, the fewer people you'll see.
    ko: 깊숙한 곳, 방주에서 멀수록 인적이 드물거든.
    ja: |-
      アークから遠く離れた奥まった場所では
      人通りも少なくなる。
  d_nikke_eh_03_40:
    speaker: "<Self>"
    en: Do you do this kind of stuff all the time?
    ko: 평소에 이런 일을 하고 있는 거야?
    ja: 普段からこういうことを？
  d_nikke_eh_03_41:
    speaker: eh_n
    en: Yeah, the streetlights in the Outer Rim are old, so they burn out fast.
    ko: 응, 아우터림의 전등은 노후돼서 금방금방 수명이 다하니까.
    ja: |-
      ええ、アウターリムの電灯は
      老朽化が進んでいて、すぐ切れてしまうから。
  d_nikke_eh_03_42:
    speaker: eh_n
    en: I have to check on them regularly to keep them running.
    ko: 이렇게 주기적으로 관리를 해주고 있어.
    ja: こうして定期的に管理をしてる。
  d_nikke_eh_03_43:
    speaker: eh_n
    en: Here, lights are like flames.
    ko: 이곳에서 전등은 불과 같거든.
    ja: ここの電灯は、ともしびみたいなもの。
  d_nikke_eh_03_44:
    speaker: eh_n
    en: If no one watches them, they die out in an instant.
    ko: 누군가 지켜봐 주지 않으면 금방 사그라들어버리겠지.
    ja: |-
      誰かが見守ってあげないと、
      すぐに消えてしまう。
  d_nikke_eh_03_45:
    speaker: eh_n
    en: That's the responsibility I take on.
    ko: 그 역할을 내가 하고 있는 거고.
    ja: だから、私が見回りをしてるの。
  d_nikke_eh_03_46:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_03_47:
    speaker: "<Monologue>"
    en: I look at the streetlight E.H. repaired.
    ko: E.H.가 설치한 전등을 바라본다.
    ja: E.H.が替えた電灯を見つめた
  d_nikke_eh_03_48:
    speaker: "<Monologue>"
    en: A faint glow spreads from the small streetlight, casting the area in gentle
      light.
    ko: 지잉-
    ja: ジジジ…
  d_nikke_eh_03_49:
    speaker: "<Monologue>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_03_50:
    speaker: "<Monologue>"
    en: Though weak, it still manages to illuminate the whole space.
    ko: |-
      작은 전등에서 흘러오는 빛은 미약하지만
      이 구역의 전체를 밝게 비추고 있다.
    ja: |-
      小さな電灯が放つ光はかすかだが、
      このエリア全体を明るく照らしていた
  d_nikke_eh_03_51:
    speaker: "<Monologue>"
    en: It almost looks like a...
    ko: 그 모습은 마치….
    ja: その様子は、まるで…
  d_nikke_eh_03_52:
    speaker: eh_n
    en: "... You okay, @UserName?"
    ko: "…@UserName, 괜찮아?"
    ja: "…@UserName、大丈夫？"
  d_nikke_eh_03_53:
    speaker: eh_n
    en: You just spaced out there for a second...
    ko: 갑자기 멍해져선….
    ja: 急にぼーっとして…
  d_nikke_eh_03_54:
    speaker: "<Self>"
    en: Oh, I was just lost in thought for a moment.
    ko: 아, 잠시 다른 생각을 좀 하느라.
    ja: ああ、少し考え事をしていた
  d_nikke_eh_03_55:
    speaker: eh_n
    en: Good.
    ko: 그렇다면 다행이네.
    ja: ならいいけど。
  d_nikke_eh_03_56:
    speaker: eh_n
    en: Let's move on to the next area.
    ko: 어서 다음 구역으로 가자.
    ja: 早く次のエリアに行こう。
  d_nikke_eh_03_57:
    speaker: eh_n
    en: If we don't hurry, we might not cover everything.
    ko: 더 늦으면 전부 돌아볼 수 없을지도 몰라.
    ja: |-
      これ以上遅くなると、
      すべて回れないかもしれない。
  d_nikke_eh_03_58:
    speaker: "<Monologue>"
    en: As E.H. shows me around the Outer Rim, it becomes clear that her days are
      filled with acts of kindness.
    ko: E.H.가 아우터 림에서 보여준 일상은 선의로 가득 차 있었다.
    ja: |-
      E.H.がアウターリムで過ごす日常は
      「善き行い」で満ちていた
  d_nikke_eh_03_59:
    speaker: "<Monologue>"
    en: She brings food wherever hunger lingers.
    ko: 굶주림이 있는 곳에 식량을.
    ja: 飢えに苦しむ人々には食糧を
  d_nikke_eh_03_60:
    speaker: "<Monologue>"
    en: She brings healing wherever wounds remain.
    ko: 상처가 남은 곳에 치유를.
    ja: 傷を負った者には癒やしを
  d_nikke_eh_03_61:
    speaker: "<Monologue>"
    en: She brings light wherever darkness falls.
    ko: 빛이 없는 곳에 빛을.
    ja: 光を失った場所には光を
  d_nikke_eh_03_62:
    speaker: "<Monologue>"
    en: E.H. keeps her hood pulled low, moving through the streets
    ko: |-
      E.H.는 모자를 깊게 눌러쓰고,
      자신의 신분을 철저히 숨긴 채 움직였기에
    ja: |-
      E.H.は帽子を目深にかぶり
      自身の正体を徹底して
      隠したまま行動していたため
  d_nikke_eh_03_63:
    speaker: "<Monologue>"
    en: so no one can recognize her
    ko: 그 누구도 E.H.를 알아보진 못했다.
    ja: E.H.だと気づく者はいなかった
  d_nikke_eh_03_64:
    speaker: "<Self>"
    en: E.H., there's something I want to ask.
    ko: E.H. 물어보고 싶은 게 있는데.
    ja: 聞きたいことがある
  d_nikke_eh_03_65:
    speaker: eh_n
    en: Yeah, what is it?
    ko: 응, 뭐야?
    ja: ええ、何？
  d_nikke_eh_03_66:
    speaker: "<Self>"
    en: Why are you hiding who you are?
    ko: 정체를 숨기는 이유가 뭐야?
    ja: なぜ自分の正体を隠すんだ？
  d_nikke_eh_03_67:
    speaker: eh_n
    en: I don't want anyone knowing it's me.
    ko: 굳이 티를 내고 싶진 않거든.
    ja: 気づかれたくないの。
  d_nikke_eh_03_68:
    speaker: eh_n
    en: There are plenty of people who wouldn't welcome my help.
    ko: 분명 나의 도움을 받는 게 달갑지 않은 사람도 있을 거고.
    ja: |-
      私の助けなら借りたくないと
      思ってる人もいるはずだし。
  d_nikke_eh_03_69:
    speaker: "<Self>"
    en: "... I see."
    ko: "…그렇구나."
    ja: "…そうか"
  d_nikke_eh_03_70:
    speaker: eh_n
    en: So... what do you think?
    ko: 그래서… 어때?
    ja: それで…どうだった？
  d_nikke_eh_03_71:
    speaker: eh_n
    en: Did you get the answer you were looking for?
    ko: 네가 원하는 대답이 나온 거 같아?
    ja: 望む答えは見つかったの？
  d_nikke_eh_03_72:
    speaker: "<Self>"
    en: Well...
    ko: 그건 말이지-
    ja: そのことなんだが…
  d_nikke_eh_03_73:
    speaker: girl02
    en: Waaaah!
    ko: 으아아아아앙-!
    ja: うわああああん！
  d_nikke_eh_03_74:
    speaker: girl02
    en: Mommy! Waaaah!
    ko: 엄마아… 훌쩍.
    ja: ママァ…ぐすん。
  d_nikke_eh_03_75:
    speaker: eh_n
    en: Someone's crying!
    ko: "! 누군가 울고 있어."
    ja: 誰かが泣いてる！
  d_nikke_eh_03_76:
    speaker: eh_n
    en: Let's go, @UserName.
    ko: 가자, @UserName.
    ja: 行こう、@UserName。
  d_nikke_eh_03_77:
    speaker: "<Narration>"
    en: E.H. holds out her hand to me.
    ko: E.H.는 나에게 손을 내밀었다.
    ja: E.H.は私に手を伸ばした
  d_nikke_eh_03_78:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_03_79:
    speaker: eh_n
    en: "... You're not coming?"
    ko: "…안 갈 거야?"
    ja: "…行かないの？"
  d_nikke_eh_03_80:
    speaker: "<Narration>"
    en: I grab her hand.
    ko: 텁-
    ja: グッ――
  d_nikke_eh_03_81:
    speaker: "<Self>"
    en: Sure, I'll come along.
    ko: 그래, 같이 가보자.
    ja: 分かった。行こう
d_nikke_eh_04:
  d_nikke_eh_04_1:
    speaker: "<Narration>"
    en: "*Thud, thud, thud*"
    ko: 다다다다-
    ja: ダダダダッ――
  d_nikke_eh_04_2:
    speaker: "<Monologue>"
    en: Sprinting toward the source of the sound,
    ko: 소리가 나는 곳으로 달려가자, 그곳엔….
    ja: |-
      泣き声がするほうへ駆けつけると、
      そこには…
  d_nikke_eh_04_3:
    speaker: "<Monologue>"
    en: we find a young girl crying.
    ko: 어린 여자아이가 울고 있었다.
    ja: 泣いている幼い女の子がいた
  d_nikke_eh_04_4:
    speaker: girl02
    en: Waaaah!
    ko: 으아아앙-!
    ja: うわああん！
  d_nikke_eh_04_5:
    speaker: girl02
    en: Mommy! Waaaah!
    ko: 엄마아… 훌쩍.
    ja: ママァ…ぐすん。
  d_nikke_eh_04_6:
    speaker: "<Self>"
    en: She's over there.
    ko: 저기 있어.
    ja: そこだ
  d_nikke_eh_04_7:
    speaker: eh_n
    en: I see her.
    ko: 그렇네.
    ja: そうね。
  d_nikke_eh_04_8:
    speaker: eh_n
    en: We should calm her down first.
    ko: 우선 달래주는 게 맞겠지.
    ja: まず泣き止ませるのが先か。
  d_nikke_eh_04_9:
    speaker: "<Narration>"
    en: Footsteps draw closer to the little girl.
    ko: 저벅- 저벅-
    ja: コツコツ…
  d_nikke_eh_04_10:
    speaker: eh_n
    en: Hey, kid...
    ko: 꼬마야.
    ja: おちびちゃん。
  d_nikke_eh_04_11:
    speaker: "<Monologue>"
    en: E.H. crouches down and meets the child at eye level.
    ko: E.H.가 쭈그려 앉아 아이와 눈높이를 맞춘다.
    ja: |-
      E.H.はしゃがみこみ、
      女の子と目線を合わせた
  d_nikke_eh_04_12:
    speaker: eh_n
    en: What are you doing here all by yourself?
    ko: 왜 여기 혼자 있는 거니.
    ja: どうしてここに1人でいるのかな。
  d_nikke_eh_04_13:
    speaker: girl02
    en: "*Sniff...* Hmm...?"
    ko: 훌쩍… 으응…?
    ja: ぐすん…うん…？
  d_nikke_eh_04_14:
    speaker: girl02
    en: "!!"
    ko: "!!!"
    ja: "！！！"
  d_nikke_eh_04_15:
    speaker: girl02
    en: E-eeek!
    ko: 히, 히이이….
    ja: ひ、ひぃぃ…
  d_nikke_eh_04_16:
    speaker: eh_n
    en: You look really pale. Are you okay?
    ko: 얼굴이 하얗게 질렸어. 왜 그러는 거지?
    ja: 顔が青ざめてるけど、どうしたの？
  d_nikke_eh_04_17:
    speaker: eh_n
    en: Are you struggling to breathe?
    ko: 호흡이 잘 안되는 거야?
    ja: 息が苦しい？
  d_nikke_eh_04_18:
    speaker: "<Self>"
    en: E.H., I don't think that's it...
    ko: E.H.….
    ja: E.H.…
  d_nikke_eh_04_19:
    speaker: "<Self>"
    en: I think it's more like...
    ko: 그게 아니라 내가 보기엔….
    ja: おそらく、そうではなく…
  d_nikke_eh_04_20:
    speaker: girl02
    en: Waaaah!
    ko: 으에에에에에엥-!
    ja: ふええええん！
  d_nikke_eh_04_21:
    speaker: girl02
    en: I-I'm scared!
    ko: 무, 무서워…!
    ja: こ、怖いよぉ…！
  d_nikke_eh_04_22:
    speaker: "<Monologue>"
    en: Seeing E.H. up close, the child starts wailing so hard it looks like she might
      pass out.
    ko: E.H.의 얼굴을 코앞에서 마주한 아이는 숨이 넘어갈 듯 울기 시작했다.
    ja: |-
      E.H.と至近距離で向き合った女の子は
      激しく泣き始めた
  d_nikke_eh_04_23:
    speaker: eh_n
    en: "!!"
    ko: "!!!"
    ja: "！！！"
  d_nikke_eh_04_24:
    speaker: eh_n
    en: What the...
    ko: 이게 무슨….
    ja: いきなりなぜ…
  d_nikke_eh_04_25:
    speaker: girl02
    en: "*Hic... sniff...*"
    ko: 흐, 흐그윽… 훌쩍.
    ja: ひ、ひっく…ぐすん。
  d_nikke_eh_04_26:
    speaker: girl02
    en: M-my mom really was right...
    ko: 여, 역시 엄마 말이 맞았어….
    ja: や、やっぱりママの言った通りだった…
  d_nikke_eh_04_27:
    speaker: girl02
    en: She said if I go outside alone, ghosts will come after me!
    ko: 밖에 혼자서 돌아다니면 귀신이 쫓아온다 그랬는데….
    ja: |-
      1人でお外に出たら、
      おばけが追いかけてくるって…
  d_nikke_eh_04_28:
    speaker: eh_n
    en: "... Ghosts?"
    ko: "…귀신이라고?"
    ja: "…おばけ？"
  d_nikke_eh_04_29:
    speaker: eh_n
    en: Are you talking about me?
    ko: 나를 이야기하는 건가?
    ja: 私のこと？
  d_nikke_eh_04_30:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_04_31:
    speaker: eh_n
    en: Help me, @UserName...
    ko: 도와줘… @UserName.
    ja: 助けて…@UserName。
  d_nikke_eh_04_32:
    speaker: eh_n
    en: What am I supposed to do?
    ko: 이럴 땐 어떻게 해야 해?
    ja: こういう時は、どうしたらいいの？
  d_nikke_eh_04_33:
    speaker: "<Narration>"
    en: "*Rustle*"
    ko: 바스락-
    ja: ガサッ
  d_nikke_eh_04_34:
    speaker: "<Self>"
    en: Here you go.
    ko: 자, 여기.
    ja: これを
  d_nikke_eh_04_35:
    speaker: "<Self>"
    en: Something sweet should help.
    ko: 아이를 달래는 데는 달콤한 게 최고야.
    ja: |-
      子どもをあやすには
      甘いものが一番だ
  d_nikke_eh_04_36:
    speaker: eh_n
    en: Candy...?
    ko: 사탕…?
    ja: キャンディ…？
  d_nikke_eh_04_37:
    speaker: eh_n
    en: Got it, thanks.
    ko: 알겠어, 고마워.
    ja: 分かった。ありがとう。
  d_nikke_eh_04_38:
    speaker: "<Monologue>"
    en: E.H. takes the candy from me and walks straight over to the child.
    ko: 나에게 사탕을 받아 든 E.H.는 곧장 아이에게 다가갔다.
    ja: |-
      キャンディを受け取ったE.H.は
      すぐに女の子のもとへ駆け寄った
  d_nikke_eh_04_39:
    speaker: eh_n
    en: Uh... Hey, kiddo. Want some candy?
    ko: 저기… 꼬마야. 사탕이라도 먹을래?
    ja: あの…おちびちゃん。キャンディでも食べる？
  d_nikke_eh_04_40:
    speaker: "<Monologue>"
    en: The child takes the candy, and just like that, the crying stops.
    ko: 사탕을 받아 문 아이는 어느새 울음을 그쳤다.
    ja: |-
      キャンディをもらって
      口に含んだ女の子は
      いつの間にか泣き止んでいた
  d_nikke_eh_04_41:
    speaker: "<Self>"
    en: Easy there with the staring. You'll scare her.
    ko: 그렇게 무섭게 쳐다보면 어떻게 해.
    ja: |-
      そんなに怖い顔で見つめて
      どうする
  d_nikke_eh_04_42:
    speaker: eh_n
    en: Me? Scare her?
    ko: 무섭게 쳐다봤다고? 내가?
    ja: 私の顔が怖い？
  d_nikke_eh_04_43:
    speaker: eh_n
    en: No way, I've always been good with kids.
    ko: 그럴 리 없어, 이때까지 나름 아이들을 잘 다뤄왔는걸.
    ja: |-
      そんなはずはない。
      今まで出会った子どもたちは
      よく懐いてたもの。
  d_nikke_eh_04_44:
    speaker: "<Self>"
    en: Oh really? What makes you say that...?
    ko: 왜 그런 생각이 든 건지 물어봐도 될까…?
    ja: なぜそう思ったんだ…？
  d_nikke_eh_04_45:
    speaker: eh_n
    en: So far, every kid I've approached has stopped crying when I get near.
    ko: 이때까지 본 아이들은 전부 내가 다가가면 울음을 그쳤거든.
    ja: 私が近づくと、みんな泣き止んでたから。
  d_nikke_eh_04_46:
    speaker: "<Monologue>"
    en: "... More like they were too scared to make a sound."
    ko: "…그건 다른 의미로 무서워한 게 아닐까."
    ja: |-
      …それは別の意味で
      恐怖を感じたのではないだろうか
  d_nikke_eh_04_47:
    speaker: eh_n
    en: Anyway...
    ko: 그나저나….
    ja: ところで…
  d_nikke_eh_04_48:
    speaker: eh_n
    en: Can you tell us what happened, kiddo?
    ko: 꼬마야, 이제 무슨 일인지 알려줄 수 있어?
    ja: おちびちゃん、いったい何があったの？
  d_nikke_eh_04_49:
    speaker: girl02
    en: "*Sniff...* W-well..."
    ko: 훌쩍… 그, 그게에….
    ja: ぐすん…あ、あのね…
  d_nikke_eh_04_50:
    speaker: girl02
    en: I just went outside for a little bit... and suddenly the lights went out...
    ko: 잠깐 밖에 나왔었는데… 갑자기 불이 꺼져서….
    ja: |-
      ちょっとお外に出たら…
      いきなり真っ暗になっちゃって…
  d_nikke_eh_04_51:
    speaker: girl02
    en: I got so scared I just fell onto the floor...
    ko: 너무 무서워서 바닥에 주저앉아버렸어….
    ja: すごく怖くて、ここから動けなかったの…
  d_nikke_eh_04_52:
    speaker: eh_n
    en: "... Don't worry, kiddo."
    ko: "…걱정하지 마, 꼬마야."
    ja: "…もう大丈夫。"
  d_nikke_eh_04_53:
    speaker: eh_n
    en: I'll make sure you get home safely,
    ko: 내가 반드시 집을 찾아줄 테니까.
    ja: 必ずおうちを見つけてあげる。
  d_nikke_eh_04_54:
    speaker: eh_n
    en: okay?
    ko: 알겠지?
    ja: いいわね？
  d_nikke_eh_04_55:
    speaker: "<Monologue>"
    en: Because E.H. knows the Outer Rim so well, we're able to find the child's home
      in no time.
    ko: |-
      이후 아우터림의 지리를 꿰고 있는 E.H. 덕에
      아이의 집을 찾는 데 그리 오랜 시간이 걸리진 않았다.
    ja: |-
      その後、アウターリムの地理を
      熟知しているE.H.のおかげで
      女の子の家はすぐに見つかった
  d_nikke_eh_04_56:
    speaker: girl02
    en: Bye, mister! Bye, lady!
    ko: 잘 가! 언니! 오빠!
    ja: またね！お姉ちゃん！お兄ちゃん！
  d_nikke_eh_04_57:
    speaker: girl02
    en: Thanks for helping me!
    ko: 오늘 정말 고마웠어!
    ja: 今日はホントにありがとう！
  d_nikke_eh_04_58:
    speaker: eh_n
    en: Don't mention it.
    ko: 너도 고생 많았어.
    ja: よく頑張ったね。
  d_nikke_eh_04_59:
    speaker: eh_n
    en: Until next time.
    ko: 다음에 또 보자.
    ja: また会おう。
  d_nikke_eh_04_60:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_04_61:
    speaker: "<Monologue>"
    en: Her face is mostly hidden by her hood,
    ko: 모자챙에 가려서 잘 보이진 않았지만.
    ja: |-
      目深にかぶった帽子のせいで
      よく見えなかったが
  d_nikke_eh_04_62:
    speaker: "<Monologue>"
    en: but I can tell E.H. is wearing a gentle smile.
    ko: E.H.는 분명 부드러운 미소를 짓고 있었다.
    ja: |-
      E.H.の顔には、確かに
      優しい笑顔が浮かんでいた
  d_nikke_eh_04_63:
    speaker: eh_n
    en: Good job, @UserName.
    ko: 고생했어, @UserName.
    ja: お疲れ、@UserName。
  d_nikke_eh_04_64:
    speaker: eh_n
    en: That's it for today.
    ko: 오늘 일과는 이걸로 끝이야.
    ja: 今日の仕事は、これで終わり。
  d_nikke_eh_04_65:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_04_66:
    speaker: eh_n
    en: "?"
    ko: "?"
    ja: "？"
  d_nikke_eh_04_67:
    speaker: eh_n
    en: Right...
    ko: "…그렇구나."
    ja: "…そう。"
  d_nikke_eh_04_68:
    speaker: eh_n
    en: Come to think of it, this probably isn't the answer you were looking for.
    ko: 생각해 보니, 네가 원하는 대답은 이게 아니었을 수도 있겠어.
    ja: |-
      お前の望む答えは
      これじゃなかったかもね。
  d_nikke_eh_04_69:
    speaker: eh_n
    en: I didn't really show you what I like... and we just wandered around all day.
    ko: |-
      좋아하는 걸 보여준 것도 아니고…
      하루 종일 돌아다니기만 했으니까.
    ja: |-
      好きなものを見せるというより…
      一日中、歩き回ってただけだから。
  d_nikke_eh_04_70:
    speaker: eh_n
    en: Sorry if all your effort went to waste.
    ko: 고생했는데 소득이 없었다면 미안해.
    ja: 時間を無駄にさせて、ごめん。
  d_nikke_eh_04_71:
    speaker: eh_n
    en: You still have to submit it to the higher-ups, right?
    ko: 위에 제출해야 하는 거지?
    ja: 上に報告するんでしょ？
  d_nikke_eh_04_72:
    speaker: eh_n
    en: I'll think up something you can put down for now.
    ko: 임시로 넣을 수 있을 만한 대답을 생각해 볼게.
    ja: とりあえず報告できそうな答えを考えておく。
  d_nikke_eh_04_73:
    speaker: "<Self>"
    en: That doesn't matter anymore.
    ko: 그런 건 이제 상관없을 거 같아.
    ja: 報告する必要はないだろう
  d_nikke_eh_04_74:
    speaker: eh_n
    en: Why's that?
    ko: 왜?
    ja: なぜ？
  d_nikke_eh_04_75:
    speaker: "<Self>"
    en: Because I know what you like to do.
    ko: E.H.가 하고 싶은 게 뭔지 알았으니까.
    ja: E.H.のしたいことが分かったから
  d_nikke_eh_04_76:
    speaker: eh_n
    en: "... You do?"
    ko: "…내가 하고 싶은 것?"
    ja: "…私がしたいこと？"
  d_nikke_eh_04_77:
    speaker: eh_n
    en: And what's that, then?
    ko: 그게 뭐지?
    ja: 何？
  d_nikke_eh_04_78:
    speaker: "<Self>"
    en: To do good deeds.
    ko: "[선행] 아닐까?"
    ja: "「善行」じゃないか？"
  d_nikke_eh_04_79:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_04_80:
    speaker: eh_n
    en: Hearing you say it like that makes me feel a little embarrassed.
    ko: 그렇게 거창하게 말해주니 뭔가 쑥스럽네.
    ja: そんなふうに言われると恥ずかしい。
  d_nikke_eh_04_81:
    speaker: eh_n
    en: But I just did what had to be done.
    ko: 해야 할 일이니까 했을 뿐이야.
    ja: やるべきことをやっただけ。
  d_nikke_eh_04_82:
    speaker: "<Self>"
    en: Just because it's something you have to do doesn't mean it can't also be something
      you want to do.
    ko: 해야 할 일이 하고 싶은 일이 되지 말란 법은 없지.
    ja: |-
      やるべきことが
      やりたいことになったっていい
  d_nikke_eh_04_83:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_04_84:
    speaker: eh_n
    en: I see...
    ko: 그렇구나….
    ja: そうかな…
  d_nikke_eh_04_85:
    speaker: eh_n
    en: Thank you, @UserName.
    ko: 고마워, @UserName.
    ja: ありがとう、@UserName。
  d_nikke_eh_04_86:
    speaker: eh_n
    en: Thanks to you, I think I finally know what I like.
    ko: 네 덕에 내가 좋아하는 게 뭔지 확실히 알게 된 거 같아.
    ja: おかげで自分の好きなものがハッキリした。
  d_nikke_eh_04_87:
    speaker: "<Self>"
    en: Don't mention it.
    ko: 천만에.
    ja: それはよかった
  d_nikke_eh_04_88:
    speaker: eh_n
    en: "*Sigh* I end up saying all kinds of things whenever I'm with you."
    ko: 후, 너랑 있다 보면 별말을 다 하게 되네.
    ja: |-
      ふぅ、お前といると
      余計なことまでしゃべってしまう。
  d_nikke_eh_04_89:
    speaker: eh_n
    en: Anyway, I'm glad it helped.
    ko: 어쨌든 도움이 됐다면 다행이야.
    ja: とにかく、役に立てたならよかった。
  d_nikke_eh_04_90:
    speaker: eh_n
    en: Um...
    ko: 그럼… 돌아가자.
    ja: じゃあ…帰ろうか。
  d_nikke_eh_04_91:
    speaker: eh_n
    en: Let's head back.
    ko: 우리들의 거처로.
    ja: 私たちの家に。
  d_nikke_eh_04_92:
    speaker: "<Self>"
    en: Okay.
    ko: 좋아.
    ja: そうしよう
d_nikke_eh_05:
  d_nikke_eh_05_1:
    speaker: "<Monologue>"
    en: We lose track of time and end up rushing back.
    ko: 생각보다 늦어버린 시간 때문에 우린 발걸음을 재촉했고.
    ja: |-
      思ったよりも遅くなってしまったので
      私たちは帰路を急ぎ
  d_nikke_eh_05_2:
    speaker: "<Monologue>"
    en: Before I know it, we're at Exotic's quarters.
    ko: 어느새 이그조틱의 거처 앞에 도착했다.
    ja: エキゾチックの住居の前に到着した
  d_nikke_eh_05_3:
    speaker: eh_n
    en: Finally, we're back.
    ko: 도착했네.
    ja: さあ、着いた。
  d_nikke_eh_05_4:
    speaker: "<Self>"
    en: Let's head inside.
    ko: 그럼, 들어가자.
    ja: 中に入ろう
  d_nikke_eh_05_5:
    speaker: eh_n
    en: All right.
    ko: 그래.
    ja: ああ
  d_nikke_eh_05_6:
    speaker: "<Narration>"
    en: "*Creeeak*"
    ko: 끼이익-
    ja: キィィ…
  d_nikke_eh_05_7:
    speaker: eh_n
    en: "?"
    ko: "…?"
    ja: "…？"
  d_nikke_eh_05_8:
    speaker: eh_n
    en: Was it always this dark in here...?
    ko: 방이 원래 이렇게 어두웠었나…?
    ja: いつもこんなに暗かったかな…？
  d_nikke_eh_05_9:
    speaker: "<Self>"
    en: I'm pretty sure we left the lights on when we went out.
    ko: 나올 때 분명 켜놓고 왔었는데.
    ja: 外出する時、電気を消した覚えはないな
  d_nikke_eh_05_10:
    speaker: eh_n
    en: Oh well,
    ko: 어쩔 수 없지.
    ja: 仕方ない。
  d_nikke_eh_05_11:
    speaker: eh_n
    en: I'll just have to switch on the light—
    ko: 라이트를 사용하는 수밖-
    ja: ライトをつけるしか…
  d_nikke_eh_05_12:
    speaker: "<Narration>"
    en: A shower of confetti and party poppers rains down.
    ko: 펑- 퍼퍼펑-!
    ja: パン！パパパーン！
  d_nikke_eh_05_13:
    speaker: jackal
    en: Hehehe! Congratulations, Boss!
    ko: 흐헤헤! 축하해, 대장!
    ja: へへ！おめでとう、隊長！
  d_nikke_eh_05_14:
    speaker: eh_n
    en: "... What's all this?"
    ko: "…이게 다 뭐야?"
    ja: "…これは何？"
  d_nikke_eh_05_15:
    speaker: viper
    en: What else would it be?
    ko: 뭐긴 뭐야~
    ja: 何って、決まってるでしょ～
  d_nikke_eh_05_16:
    speaker: viper
    en: A surprise party just for you, Boss!
    ko: 새로운 리더를 위해 우리가 준비한 깜짝 파티지.
    ja: |-
      新しいリーダーのために準備した
      サプライズパーティーだよ。
  d_nikke_eh_05_17:
    speaker: eh_n
    en: A surprise... party?
    ko: 깜짝… 파티?
    ja: サプライズ…パーティー？
  d_nikke_eh_05_18:
    speaker: "<Monologue>"
    en: E.H. still looks confused, as if she hasn't fully grasped the situation.
    ko: E.H.는 아직도 상황 파악이 안 된 듯, 어리둥절해하고 있다.
    ja: |-
      まだ状況が把握できていないのか、
      E.H.はあっけに取られている
  d_nikke_eh_05_19:
    speaker: viper
    en: Jackal did almost all the work,
    ko: 준비는 자칼이 나서서 거의 다 해줬어.
    ja: |-
      ジャッカルが率先して
      全部準備してくれたの。
  d_nikke_eh_05_20:
    speaker: viper
    en: and I just helped a little...
    ko: 나도 손을 좀 얹긴 했지만….
    ja: 私もちょっと手伝ったけど…
  d_nikke_eh_05_21:
    speaker: viper
    en: Anyway, we look forward to working with you from now on ♡
    ko: 아무튼 앞으로 나 좀 잘 부탁할게.
    ja: とにかく、これからよろしくね♡
  d_nikke_eh_05_22:
    speaker: "<Self>"
    en: Welcome to Exotic, E.H.
    ko: 이그조틱에 들어온 걸 환영해, E.H.
    ja: エキゾチックにようこそ、E.H.
  d_nikke_eh_05_23:
    speaker: eh_n
    en: "@UserName... you knew about this?"
    ko: "@UserName… 너도 알고 있던 거야?"
    ja: "@UserName…知っていたのか？"
  d_nikke_eh_05_24:
    speaker: viper
    en: Of course!
    ko: 당연하지~
    ja: もちろ～ん。
  d_nikke_eh_05_25:
    speaker: viper
    en: We sent him to find out what you like,
    ko: 우리 리더가 뭘 좋아하는지 알아내라고 보내놨는데.
    ja: |-
      リーダーの好みを
      聞きだしてもらおうと思ったのに、
  d_nikke_eh_05_26:
    speaker: viper
    en: and all he came back with was something like good deeds!
    ko: 선행을 좋아하는 거 같다는 알 수 없는 얘기나 하고 말이야~
    ja: |-
      善行が好きらしいとか
      ワケ分かんないこと言って～
  d_nikke_eh_05_27:
    speaker: viper
    en: But we already know you're a good person, so no surprises there.
    ko: 리더가 착한 건 우리도 알고 있거든?
    ja: |-
      リーダーが優しいってコトは
      私たちも知ってるし♡
  d_nikke_eh_05_28:
    speaker: "<Self>"
    en: "... What can you do? It's the truth."
    ko: "…사실인 걸 어떻게 해."
    ja: "…事実を言ったまでだ"
  d_nikke_eh_05_29:
    speaker: viper
    en: It's okay!
    ko: 괜찮아~ 괜찮아~
    ja: 大丈夫、大丈夫～
  d_nikke_eh_05_30:
    speaker: viper
    en: I knew this might happen, so Jackal and I went ahead and got a cake ready.
    ko: 그럴 줄 알고 자칼이랑 같이 케이크를 준비했거든.
    ja: |-
      そんなことだろうと思って
      ジャッカルとケーキを用意したんだから。
  d_nikke_eh_05_31:
    speaker: "<Self>"
    en: A cake?
    ko: 케이크?
    ja: ケーキ？
  d_nikke_eh_05_32:
    speaker: jackal
    en: Teehee, look at thissss!
    ko: 헤헤, 이거 봐!
    ja: へへ、見て！
  d_nikke_eh_05_33:
    speaker: jackal
    en: Viper and I worked really hard on it!
    ko: 나랑 바이퍼랑 진짜 힘들게 구했어!
    ja: |-
      私とバイパーで、
      やっとのことでゲットしたんだよ！
  d_nikke_eh_05_34:
    speaker: "<Monologue>"
    en: In Jackal's hands is a cake with the words "Welcome to Exotic!" written on
      it.
    ko: |-
      자칼의 손에는 [Welcome To Exotic!] 이라는
      문구가 적힌 케이크가 들려있다.
    ja: |-
      ジャッカルは
      「Welcome To Exotic!」と
      書かれたケーキを持っていた
  d_nikke_eh_05_35:
    speaker: jackal
    en: Isn't it super pretty?
    ko: 완전 이쁘지!
    ja: すっごくかわいいでしょ？
  d_nikke_eh_05_36:
    speaker: eh_n
    en: "... It is."
    ko: "…그렇네."
    ja: "…そうね。"
  d_nikke_eh_05_37:
    speaker: viper
    en: What's the matter?
    ko: 뭐야~ 정말.
    ja: え～それだけ～？
  d_nikke_eh_05_38:
    speaker: viper
    en: If you like it, just say so!
    ko: 좋으면 좋다고 말을 해야지~
    ja: |-
      気に入ったなら
      素直にそう言えばいいのに～
  d_nikke_eh_05_39:
    speaker: viper
    en: How are we supposed to know if you keep it all bottled up?
    ko: 그렇게 꽁꽁 숨기고 있으면 어떻게 아냐구.
    ja: 隠してたら、伝わらないよ。
  d_nikke_eh_05_40:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_05_41:
    speaker: eh_n
    en: Thank you... everyone.
    ko: 고마워… 다들.
    ja: ありがとう…みんな。
  d_nikke_eh_05_42:
    speaker: eh_n
    en: I didn't expect you'd care this much.
    ko: 이렇게 신경 써주고 있을 줄은 몰랐어.
    ja: こんなことをしてくれるなんて思わなかった。
  d_nikke_eh_05_43:
    speaker: viper
    en: Hehe, not bad! I'd give that a perfect score ♡
    ko: 아핫, 훌륭한데? 백 점짜리 대답이야.
    ja: あはっ、すごいじゃん！100点満点の答え♡
  d_nikke_eh_05_44:
    speaker: viper
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_05_45:
    speaker: viper
    en: All right, shall we get started?
    ko: 그럼 슬슬 시작해 볼까?
    ja: じゃ、そろそろ始めよっか？
  d_nikke_eh_05_46:
    speaker: viper
    en: You ready, Jackal?
    ko: 자칼, 준비됐어?
    ja: ジャッカル、準備はいい？
  d_nikke_eh_05_47:
    speaker: jackal
    en: Hehe, you betcha!
    ko: 흐흐흥, 물론이지!
    ja: へへへっ、もちろん！
  d_nikke_eh_05_48:
    speaker: "<Self>"
    en: What are you guys up to?
    ko: "? 뭘 하려는 거야?"
    ja: 何をするんだ？
  d_nikke_eh_05_49:
    speaker: viper
    en: It'd be no fun to just hand out a cake and be done with it!
    ko: 이렇게 축하만 해 주고 끝나면 재미없잖아~
    ja: お祝いするだけじゃ、つまらないでしょ～
  d_nikke_eh_05_50:
    speaker: viper
    en: Let me show you how we really celebrate ♡
    ko: 우리의 축하 방식을 보여주려고.
    ja: |-
      エキゾチック流の
      お祝いの仕方を見せてあげる♡
  d_nikke_eh_05_51:
    speaker: eh_n
    en: And what's that supposed to mean...?
    ko: 그게 뭔데…?
    ja: 何をするの…？
  d_nikke_eh_05_52:
    speaker: jackal
    en: Boss, Boss!
    ko: 대장 대장!
    ja: 隊長、隊長！
  d_nikke_eh_05_53:
    speaker: jackal
    en: Viper just told me you can totally eat the cake with your face!
    ko: 아까 바이퍼한테 들은 건데, 케이크를 얼굴로 먹을 수도 있데!
    ja: |-
      さっきバイパーから聞いたんだけど
      ケーキを顔で食べられるんだって！
  d_nikke_eh_05_54:
    speaker: jackal
    en: So ya better enjoy it, okay?
    ko: 그러니까 맛있게 먹어줘야 해?!
    ja: だから、召し上がれ！
  d_nikke_eh_05_55:
    speaker: "<Narration>"
    en: Jackal flings the cake,
    ko: 휘익-!
    ja: ビュン！
  d_nikke_eh_05_56:
    speaker: "<Monologue>"
    en: and it rockets straight toward E.H.
    ko: 자칼의 손을 떠난 케이크는 빠른 속도로 E.H.를 향해 날아가기 시작했다.
    ja: |-
      ジャッカルが投げたケーキが
      猛スピードでE.H.目がけて飛んできた
  d_nikke_eh_05_57:
    speaker: eh_n
    en: "!"
    ko: "!"
    ja: "！"
  d_nikke_eh_05_58:
    speaker: "<Monologue>"
    en: E.H. ducks just in time,
    ko: 하지만 E.H.는 신속하게 몸을 숙였고.
    ja: |-
      だが、E.H.は
      素早くしゃがみこみ
  d_nikke_eh_05_59:
    speaker: "<Monologue>"
    en: but the cake doesn't stop...
    ko: 결국 그 케이크는….
    ja: そのケーキは…
  d_nikke_eh_05_60:
    speaker: "<Narration>"
    en: "*Splat!*"
    ko: 철퍽-!
    ja: ベチャッ！
  d_nikke_eh_05_61:
    speaker: "<Monologue>"
    en: In the end, it hits me right in the face.
    ko: 뒤에 서 있던 내 얼굴에 적중했다.
    ja: 後ろに立っていた私の顔に直撃した
  d_nikke_eh_05_62:
    speaker: viper
    en: Oh my, that didn't go quite as planned.
    ko: 어머, 이건 계획에 없었는데.
    ja: あら、これは予想外だね。
  d_nikke_eh_05_63:
    speaker: "<Self>"
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_05_64:
    speaker: jackal
    en: Pfft... hahaha.
    ko: 푸… 푸흡.
    ja: ぷっ…ぷぷっ。
  d_nikke_eh_05_65:
    speaker: jackal
    en: Hahahahahaha!
    ko: 푸하하하하하!
    ja: ぶはははははっ！
  d_nikke_eh_05_66:
    speaker: jackal
    en: Oh man, you should see your face right now, Commander!
    ko: 지, 지휘관… 지금 얼굴 완전 웃겨!
    ja: し、指揮官…今の顔、本当に面白い！
  d_nikke_eh_05_67:
    speaker: viper
    en: Hehe ♡
    ko: 후후후, 그러게♡
    ja: ふふふ、ホント♡
  d_nikke_eh_05_68:
    speaker: viper
    en: If only I could take a picture.
    ko: 사진으로 남겨놓고 싶을 정도야.
    ja: 写真に収めておきたいくらい。
  d_nikke_eh_05_69:
    speaker: eh_n
    en: "*Sigh*"
    ko: "…후."
    ja: "…ふっ。"
  d_nikke_eh_05_70:
    speaker: eh_n
    en: You two are incorrigible...
    ko: 정말 너희들은….
    ja: まったくお前たちは…
  d_nikke_eh_05_71:
    speaker: "<Monologue>"
    en: As the night deepens,
    ko: 그렇게 파티의 밤은 깊어졌고
    ja: |-
      こうして
      パーティーの夜は更けていき
  d_nikke_eh_05_72:
    speaker: "<Monologue>"
    en: the sounds of laughter continue to spill from a building in the Outer Rim,
      echoing into the dark.
    ko: 아우터 림의 한 건물에서 흘러나오는 웃음소리는 끊이지 않았다.
    ja: |-
      アウターリムの片隅から
      聞こえる笑い声は
      途絶えることはなかった
  d_nikke_eh_05_73:
    speaker: "<Narration>"
    en: "*Creeeak*"
    ko: 끼이익-
    ja: キィィ…
  d_nikke_eh_05_74:
    speaker: "<Self>"
    en: What are you doing out here?
    ko: 거기서 뭐 해?
    ja: そこで何をしているんだ？
  d_nikke_eh_05_75:
    speaker: eh_n
    en: Oh,
    ko: 아.
    ja: ああ。
  d_nikke_eh_05_76:
    speaker: eh_n
    en: it's you, @UserName.
    ko: "@UserName, 너구나."
    ja: "@UserNameか。"
  d_nikke_eh_05_77:
    speaker: eh_n
    en: I just stepped out for some fresh air.
    ko: 잠시 바람 좀 쐬고 있었어.
    ja: 少し風にあたりたくて。
  d_nikke_eh_05_78:
    speaker: "<Self>"
    en: Mind if I sit next to you?
    ko: 옆에 앉아도 될까?
    ja: 隣に座ってもいいか？
  d_nikke_eh_05_79:
    speaker: eh_n
    en: Of course not.
    ko: 물론이지.
    ja: ええ。
  d_nikke_eh_05_80:
    speaker: "<Self>"
    en: How's the party?
    ko: 파티는 좀 어땠어?
    ja: パーティーは、どうだった？
  d_nikke_eh_05_81:
    speaker: eh_n
    en: I'm not great with words... but I'm really happy.
    ko: 표현이 서툴러서 말은 잘 못했지만… 행복했어.
    ja: |-
      言葉で表現するのが苦手だから
      うまく言えないんだけど…
      幸せだった。
  d_nikke_eh_05_82:
    speaker: eh_n
    en: I'm lucky to have met such good squadmates.
    ko: 운이 좋게 좋은 동료들을 만난 거 같아.
    ja: 運よく、いい仲間たちに出会えたみたい。
  d_nikke_eh_05_83:
    speaker: eh_n
    en: Viper, Jackal, and...
    ko: 바이퍼랑 자칼 그리고…
    ja: ジャッカルとバイパー、そして…
  d_nikke_eh_05_84:
    speaker: eh_n
    en: you, too.
    ko: 너도.
    ja: お前とも。
  d_nikke_eh_05_85:
    speaker: "<Monologue>"
    en: I look up at the sky along with E.H.
    ko: E.H.와 함께 하늘을 올려다본다.
    ja: E.H.と一緒に空を見上げた
  d_nikke_eh_05_86:
    speaker: "<Monologue>"
    en: It's pitch black; I can't see a thing.
    ko: 어둡다, 아무것도 보이지 않는다.
    ja: 暗くて何も見えない
  d_nikke_eh_05_87:
    speaker: "<Monologue>"
    en: My gaze naturally falls on the streetlight ahead of us.
    ko: 자연스레 앞에 있는 전등에 시선이 닿았다.
    ja: 自然と目の前の電灯に目がいった
  d_nikke_eh_05_88:
    speaker: "<Monologue>"
    en: It flickers weakly as if it might go out at any moment.
    ko: 깜빡깜빡 꺼질 듯 위태로운 전등이지만
    ja: |-
      チカチカと点滅を繰り返し、
      今にも消えそうではあるが
  d_nikke_eh_05_89:
    speaker: "<Monologue>"
    en: Yet it clings on, casting a soft glow over everything around it.
    ko: 힘겹게 수명을 이어가며 주변을 밝게 비추고 있었다.
    ja: |-
      懸命に光を保ちながら
      周囲を明るく照らしていた
  d_nikke_eh_05_90:
    speaker: eh_n
    en: "@UserName,"
    ko: "@UserName, 있잖아."
    ja: "@UserName。"
  d_nikke_eh_05_91:
    speaker: eh_n
    en: do you think I could ever be a light for someone?
    ko: 나도 누군가에게 저런 빛이 되어 줄 수 있을까?
    ja: |-
      私も誰かにとって
      あの光のような存在になれるかな？
  d_nikke_eh_05_92:
    speaker: eh_n
    en: A guiding light
    ko: 어둠 속에서 길을 잃었을 때.
    ja: 暗闇で道に迷った時、
  d_nikke_eh_05_93:
    speaker: eh_n
    en: when they've lost their way in the dark...
    ko: 이정표로 삼을 수 있는… 그런 빛 말이야.
    ja: 道しるべになるような…そういう光。
  d_nikke_eh_05_94:
    speaker: eh_n
    en: I know I'm no blazing sun,
    ko: 내가 커다란 태양이 될 수 없다는 사실은 알아.
    ja: 太陽みたいにはなれないだろうけど、
  d_nikke_eh_05_95:
    speaker: eh_n
    en: but maybe even a small light like mine... could be enough.
    ko: 그런 작은 불이라면… 충분해.
    ja: ああいう小さい光にでもなれたら…それで十分。
  d_nikke_eh_05_96:
    speaker: "<Self>"
    en: You already are, E.H.
    ko: 내가 본 E.H.는 이미 빛이었어.
    ja: 私には、もう十分輝いて見える
  d_nikke_eh_05_97:
    speaker: eh_n
    en: "!"
    ko: "…!"
    ja: "…！"
  d_nikke_eh_05_98:
    speaker: "<Self>"
    en: If you ever doubt it, we'll be here to help you believe it.
    ko: |-
      아니라는 생각이 들면,
      그렇다고 생각이 들 때까지 우리가 도와줄게.
    ja: |-
      信じられないなら、そう思えるまで
      私たちが手伝おう
  d_nikke_eh_05_99:
    speaker: eh_n
    en: "... All right."
    ko: "…그래."
    ja: "…分かった。"
  d_nikke_eh_05_100:
    speaker: eh_n
    en: With you all by my side... I think I can do it.
    ko: 너희와 함께라면… 가능할 거 같다는 생각이 들어.
    ja: みんなと一緒なら…そんな日が来るかも。
  d_nikke_eh_05_101:
    speaker: eh_n
    en: "..."
    ko: "……."
    ja: "……"
  d_nikke_eh_05_102:
    speaker: "<Narration>"
    en: E.H. holds out her hand.
    ko: E.H.가 손을 내밀었다.
    ja: E.H.が手を差し出した
  d_nikke_eh_05_103:
    speaker: eh_n
    en: I'll be counting on you from here on out, @UserName.
    ko: 앞으로도 잘 부탁할게, @UserName.
    ja: これからもよろしく、@UserName。
  d_nikke_eh_05_104:
    speaker: "<Monologue>"
    en: The deeper the darkness grows, the brighter even a small light can shine.
    ko: 어둠이 깊을수록 작은 빛은 더욱 힘을 발한다.
    ja: |-
      暗闇が深まるほど
      小さな光は、より一層輝きを増す
  d_nikke_eh_05_105:
    speaker: "<Monologue>"
    en: As long as it doesn't go out,
    ko: 이 빛이 꺼지지 않는 한,
    ja: この光が消えない限り
  d_nikke_eh_05_106:
    speaker: "<Monologue>"
    en: small sparks of light will find each other and gather,
    ko: 작은 빛들이 서로를 찾아내 모이고
    ja: |-
      小さな光は、
      互いを引き寄せ合うように集まり
  d_nikke_eh_05_107:
    speaker: "<Monologue>"
    en: until they become a light strong enough to push the darkness away.
    ko: 언젠가 어둠을 밀어내는 큰 빛이 될 것이다.
    ja: |-
      いつか暗闇を打ち消す
      大きな光となるだろう
  d_nikke_eh_05_108:
    speaker: "<Monologue>"
    en: I've decided to walk beside E.H. until that day comes
    ko: 나는 그날이 올 때까지 E.H.와 함께 걸어가기로 했다.
    ja: |-
      私はその日が来るまで
      E.H.と共に歩んでいく
  d_nikke_eh_05_109:
    speaker: "<Monologue>"
    en: as another small spark of light.
    ko: 또 하나의 작은 불씨로서.
    ja: もうひとつの小さな光として
