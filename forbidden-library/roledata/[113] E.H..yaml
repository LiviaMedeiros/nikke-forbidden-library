---
113_name:
  en: E.H.
  ko: E.H.
  ja: E.H.
c113_description:
  en: |-
    The new leader of the Exotic Squad.
    She is the former leader of the terrorist group, Heavenly Ascension. After the terrorist attack in the Ark, she became a Nikke to atone for her past.
  ko: |-
    이그조틱 스쿼드의 새로운 리더.
    과거 테러리스트 조직, [엔터 헤븐]의 리더였으나 방주 테러 사건 이후 과거를 속죄하기 위해 니케가 되었다.
  ja: |-
    エキゾチック部隊の新しいリーダー。
    かつてテロリスト組織「エンターヘブン」のリーダーだったが
    アークテロ事件以降、過去の罪を償うためにニケになった。
113_cv:
  en: "-"
  ko: "-"
  ja: "-"
piece_113:
  en: E.H.'s Spare Body
  ko: E.H. 스페어 바디
  ja: E.H.のスペアボディ
piece:
  en: |-
    Can be used for Nikkes' Limit Breaks.
    If a Nikke's Limit Break has reached the max level, any additional Spare Bodies for that Nikke will be converted to Body Labels.
  ko: |-
    니케의 한계돌파 재료로 사용됩니다.
    최대로 성장한 니케의 스페어 바디는 바디 라벨로 변경됩니다.
  ja: |-
    ニケの限界突破素材として使用する
    最大値まで成長したニケのスペアボディは、\nボディラベルに変更される
character_shot_name_localkey_smg_down:
  en: Submachine Gun
  ko: 기관단총
  ja: サブマシンガン
character_shot_description_localkey_smg_down:
  en: |-
    ■ Affects target(s).
    <color=#00AEFF>Deals {damage}% of ATK as damage.
    Deals {core_damage_rate}% damage when attacking core.</color>
  ko: |-
    ■ 대상에게
    <color=#00AEFF>[공격력 {damage}% 대미지]
    [코어 대미지 {core_damage_rate}%]</color>
  ja: |-
    ■対象に
    <color=#00AEFF>「攻撃力の{damage}％のダメージ」
    「コアダメージ{core_damage_rate}％」</color>
21132_name:
  en: Scrap Hunt
  ko: 정크 헌팅
  ja: ジャンクハンティング
21132_description:
  en: |-
    ■ Affects self.
    <color=#00AEFF>Function: Gains a buff when obtaining Scraps.
    Effect 1: Activates at the start of battle. Scraps ▲ {description_value_07} continuously, up to a maximum of {description_value_02}.
    Effect 2: Activates when an ally or self destroys a <word_group=10096>destructible projectile</word_group>. Scraps ▲ {description_value_01} continuously, up to a maximum of {description_value_02}.
    Effect 3: Activates when an ally or self <word_group=10052>destroys an enemy's part</word_group>. Scraps ▲ {description_value_03} continuously, up to a maximum of {description_value_02}.
    Effect 4: Activates when <word_group=10077>an enemy is neutralized</word_group>. Scraps ▲ {description_value_04} continuously, up to a maximum of {description_value_02}.
    Effect 5: Activates when obtaining Scraps. <word_group=10009>Elemental Advantage Attack Damage</word_group> ▲ {description_value_05}% for {description_value_06} sec.</color>
  ko: |-
    ■ 자신에게
    <color=#00AEFF>기능 : 폐품 획득 시 이로운 효과를 얻습니다.
    효과 1 : 전투 시작 시 [폐품 {description_value_07}개 ▲] [최대 {description_value_02}개] [지속]
    효과 2 : 자신을 포함한 아군 누군가 <word_group=10096>파괴 가능한 발사체</word_group> 파괴 시 [폐품 {description_value_01}개 ▲] [최대 {description_value_02}개] [지속]
    효과 3 : 자신을 포함한 아군 누군가 <word_group=10052>파츠 파괴 시</word_group> [폐품 {description_value_03}개 ▲] [최대 {description_value_02}개] [지속]
    효과 4 : <word_group=10077>적 사망 시</word_group> [폐품 {description_value_04}개 ▲] [최대 {description_value_02}개] [지속]
    효과 5 : 폐품 획득 시 [<word_group=10009>우월 코드 공격 대미지</word_group> {description_value_05}% ▲] [{description_value_06}초 유지]</color>
  ja: |-
    ■自分に
    <color=#00AEFF>機能：廃品を回収し、強化効果を得る
    効果1：戦闘開始時「廃品{description_value_07}個▲」
    「最大{description_value_02}個」「持続」
    効果2：自分を含む味方の誰かが
    <word_group=10096>破壊可能な発射体</word_group>を破壊した時、
    「廃品{description_value_01}個▲」「最大{description_value_02}個」「持続」
    効果3：自分を含む味方の誰かが
    <word_group=10052>パーツを破壊した時</word_group>
    「廃品{description_value_03}個▲」「最大{description_value_02}個」「持続」
    効果4：<word_group=10077>敵が破壊された時</word_group>
    「廃品{description_value_04}個▲」「最大{description_value_02}個」「持続」
    効果5：廃品を回収した時、
    「<word_group=10009>有利コードの攻撃ダメージ</word_group>{description_value_05}％▲」
    「{description_value_06}秒間維持」</color>
skill_name_1003:
  en: Skill 2
  ko: 스킬2
  ja: スキル2
21131_name:
  en: Homemade Magazine
  ko: 홈메이드 매거진
  ja: ホームメイドマガジン
21131_description:
  en: |-
    ■ Activates when obtaining {description_value_01} Scrap(s) while having fewer than {description_value_02} homemade magazines crafted. Affects self.
    <color=#00AEFF>Function: Crafts magazines out of Scraps and gains a buff.
    Effect 1: Removes Scrap(s).
    Effect 2: Crafts 1 homemade magazine, up to a maximum of {description_value_02}. This effect is continuous.
    Effect 3: ATK ▲ {description_value_03}% continuously x the number of homemade magazines.</color>
  ko: |-
    ■ 폐품 {description_value_01}개 획득 시 사제 탄창 제작 수가 {description_value_02}개 미만이라면 자신에게
    <color=#00AEFF>기능 : 폐품을 탄창으로 제작 후 이로운 효과를 부여합니다.
    효과 1 : [폐품 제거]
    효과 2 : [사제 탄창 제작 1개] [최대 {description_value_02}개 보유] [지속]
    효과 3 : [공격력 {description_value_03}% X 사제 탄창 개수 ▲] [지속]</color>
  ja: |-
    ■廃品を{description_value_01}個回収した時、
    自家製弾倉が{description_value_02}本未満なら自分に
    <color=#00AEFF>機能：廃品で自家製弾倉を製造し、
    強化効果を得る
    効果1：「廃品数リセット」
    効果2：「自家製弾倉1本増加」「最大{description_value_02}本」「持続」
    効果3：「攻撃力{description_value_03}％×自家製弾倉数▲」「持続」</color>
skill_name_1002:
  en: Skill 1
  ko: 스킬1
  ja: スキル1
11133_name:
  en: Heavenbound
  ko: 인 투 더 헤븐
  ja: イン・トゥ・ザ・ヘブン
11133_description:
  en: |-
    ■ Affects self.
    <color=#00AEFF>Changes the weapon in use.
    Charge Time: 0.4 sec
    Damage: {description_value_01}% of <word_group=10025>final</word_group> ATK
    Full Charge Damage: 250% of damage
    Max Ammunition Capacity: 1 x the number of homemade magazines
    Duration: {description_value_02} sec
    <word_group=10097>Removal condition</word_group>: When the duration ends or when all rounds have been fired.
    Additional Effect:
    ATK ▲ {description_value_03}% for {description_value_04} sec.</color>
  ko: |-
    ■ 자신에게
    <color=#00AEFF>[사용 무기 변경]
    차지 시간 : 0.4초
    대미지 : <word_group=10025>최종</word_group> 공격력 {description_value_01}%
    풀 차지 대미지 : 250% 대미지
    최대 장탄 수 : 1발 X 사제 탄창 개수
    유지 시간 : {description_value_02}초 유지
    <word_group=10097>제거 시점</word_group> : 유지 시간 종료 또는 모든 탄환 발사 시
    추가 효과
    [공격력 {description_value_03}% ▲] [{description_value_04}초 유지]</color>
  ja: |-
    ■自分に
    <color=#00AEFF>「使用武器変更」
    チャージ時間：0.4秒
    ダメージ：<word_group=10025>最終</word_group>攻撃力の{description_value_01}％
    フルチャージダメージ：250％
    最大装弾数：1発×自家製弾倉の数
    持続時間：{description_value_02}秒
    <word_group=10097>解除条件</word_group>：
    持続時間終了または全弾消費した時
    追加効果
    「攻撃力{description_value_03}％▲」「{description_value_04}秒間維持」</color>
