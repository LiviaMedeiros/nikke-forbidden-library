110_name:
  en: Crow
  ko: 크로우
  ja: クロウ
111_name:
  en: Jackal
  ko: 자칼
  ja: ジャッカル
112_name:
  en: Viper
  ko: 바이퍼
  ja: バイパー
c113_Lobby_Touch_1:
  en: I owe you a great debt for everything you've done for me. I promise to pay you
    back in any way I can.
  ko: |-
    이전엔 신세 많이 졌어.
    어떤 식으로든 네게 진 빚은 꼭 갚도록 할게.
  ja: |-
    色々ありがとう。
    どんな形でも、借りは必ず返す。
c113_Lobby_Touch_2:
  en: I want to atone for what I've done. I may not be forgiven, but... I still want
    to do it.
  ko: |-
    저지른 일에 대한 속죄를 하고 싶어.
    아무도 받아주지 않는다고 해도… 그래도 하고 싶어.
  ja: |-
    罪をつぐないたい。
    誰も許してくれなかったとしても…
c113_Lobby_Touch_3:
  en: I used to think that as long as you were in the right, any means were justified,
    no matter how terrible. I realized far too late just how wrong I was...
  ko: |-
    목적만 옳다면 방법이 그릇되어도 상관없다고 생각했었어.
    그게 얼마나 잘못된 생각이었는지 너무 나중에 알았지….
  ja: |-
    目的さえ正しければ、手段が間違っていても構わないと思ってた。
    その考えが間違っていると気づいたときには、もう遅かった…
c113_Lobby_Touch_Love_1:
  en: There are no shortcuts when you're trying to walk the right path. I understand
    that now, which is why I'm just doing my best.
  ko: |-
    이젠 알아. 옳은 길을 꿈꾸기 위해선 빠른 길은 없다는 걸.
    그러니 최선을 다할 뿐이야.
  ja: |-
    今ならよく分かる。
    正しい道を歩もうとするなら、近道なんてないって。
    だから、今は最善を尽くすだけ。
c113_Lobby_Touch_Love_2:
  en: I thought I could change the world and save people. I was so blinded by this
    sense of duty that I couldn't even see the terrible things I was doing...
  ko: |-
    세상을 바꾸고 누군가를 구원할 수 있을 거라고 생각했어.
    사명에 눈이 멀어 죄를 짓고 있는지조차 몰랐으면서….
  ja: |-
    世界を変えて、誰かを救えるはずだって信じてたの。
    使命に目がくらみ、罪の意識さえ感じていなかった…
c113_Lobby_Touch_Love_3:
  en: Thank you for trusting me, even after everything that's happened. As I move
    forward, I won't forget the weight of my sins.
  ko: |-
    그런 일이 있었는데도 신뢰해 줘서 고마워.
    늘 마음속에 죄의 무게를 잊지 않고 살아갈게.
  ja: |-
    あんなことがあったのに、信じてくれてありがとう。
    この罪の重さを胸に刻んで、生きていくつもり。
c113_Lobby_Stay_1:
  en: Looks like you're pretty busy. I'll go ahead and do my own thing.
  ko: |-
    많이 바쁜가 보네.
    그럼 나도 따로 움직이고 있을게.
  ja: |-
    忙しそう。
    私も別行動しよう。
c113_Lobby_Stay_Love_1:
  en: This place is peaceful and warm, even when you're away... Is it really okay
    for me to be here?
  ko: |-
    여긴 네가 없어도 평화롭고 따뜻하군.
    …내가 이런 곳에 있어도 될지 모르겠네.
  ja: |-
    ここはお前がいなくても穏やかであたたかい。
    …私は、ここにいてもいいのだろうか。
c113_Outpost_Touch_1:
  en: This place is... really peaceful. It's exactly the kind of place I wanted the
    Outer Rim to become...
  ko: |-
    여긴… 정말 평화롭네.
    아우터 림도 이런 곳이 되길 바랬는데….
  ja: |-
    ここは…本当に平和。
    アウターリムもこんなふうに なれたらよかったのに…
c113_Outpost_Touch_2:
  en: If you have something to tell me while I'm gone, leave a message at the Trendy
    Bar. ... Oh, you'll just text me? Yeah, that works too.
  ko: |-
    내가 부재 중일 때 할 말이 있다면, 모던 바에 메시지를 남겨줘.
    아… 블라를 보내겠다고. 그것도 좋겠네.
  ja: |-
    私がいない間に何かあったら、 バーにメッセージを残して。
    あぁ… BlaBla？ それでもいい。
c113_Outpost_Touch_3:
  en: All the Nikkes here look so happy... I suppose that's all thanks to your efforts.
  ko: |-
    여기에 있는 니케들 모두 행복해하는 모습이네.
    …이런 곳을 만들어낸 건 전부 너의 노력 덕분이겠지.
  ja: |-
    ここにいるニケたちは、 みんな幸せそう。
    …こんな場所になったのも、 すべてお前の努力のおかげね。
c113_Gacha_Get_1:
  en: It's me, E.H. I'll do everything in my power to help, just as you helped me.
  ko: "E.H.야. \n신세 졌던만큼 최선을 다해 도울게."
  ja: |-
    E.H.よ。
    世話になった分、全力でサポートさせてもらう。
c113_Reinforce_1:
  en: I'm once again in your debt.
  ko: 또 신세를 졌네.
  ja: また助けられた。
c113_Reinforce_2:
  en: Where did you even manage to find all these materials?
  ko: 이런 재료를 어디서 다 구해온 거지?
  ja: どこでこんな素材を？
c113_Reinforce_3:
  en: I'll do everything I can to prove that your trust in me is not misplaced.
  ko: 보내준 신뢰만큼, 최선의 결과를 낼게.
  ja: 信頼に応えられるよう、最善を尽くす。
c113_Gift_1:
  en: Is it really okay for me to accept something this nice?
  ko: 이렇게 귀한걸 내가 받아도 되는 거야?
  ja: こんな貴重なものを、私がもらっていいの？
c113_Gift_2:
  en: I really needed this... Thank you for getting it for me. I swear to repay you
    someday.
  ko: |-
    필요했던 건데… 구해줘서 고마워.
    언젠가 꼭 보답할게.
  ja: |-
    これ、必要だったの…探してくれてありがとう。
    いつかこの恩は必ず返す。
c113_Gift_3:
  en: You really don't have to be this nice to me... Still, I do appreciate it.
  ko: |-
    나한테 이렇게 잘 해줄 필요는 없는데….
    …그래도 챙겨줘서 고마워.
  ja: |-
    ここまでしてくれなくても…
    …でも、気を遣ってくれてありがとう。
c113_Attractive_Up_1:
  en: It feels like all I ever do is get help from you... I don't know how to express
    my gratitude.
  ko: "매번 네겐 도움만 받아서, \n뭐라고 감사 인사를 해야 할지 모르겠네."
  ja: いつも助けてもらってばかりで感謝の言葉すら見つからない。
c113_Attractive_Up_2:
  en: I think I understand why so many Nikkes rely on you. Your words and actions
    naturally inspire trust.
  ko: |-
    왜 많은 니케들이 네게 의지하는지 알 것 같아.
    네 말과 행동이 널 신뢰하게 하는 거겠지.
  ja: |-
    ニケたちがみんなお前を頼る理由が分かった。
    その言動が、信頼につながってる。
c113_Attractive_Up_3:
  en: You really are an incredible person. You actually might just be able to change
    the world...
  ko: |-
    넌 참 대단한 사람이구나.
    어쩌면… 너라면 정말로 세상을 바꿀 수 있을 것 같아.
  ja: |-
    本当にすごい。
    お前なら…本当に世界を変えられるかもしれない。
c113_Party_Deploy_1:
  en: Good. I'll go with you.
  ko: 좋아. 함께할게.
  ja: 分かった。協力する。
c113_Field_Touch_1:
  en: Okay. What do you need me to do?
  ko: 응. 뭘 하면 돼?
  ja: ええ。何をすればいい？
c113_Field_Go_1:
  en: Sure, I'll get moving.
  ko: 그래. 이동할게.
  ja: よし。移動する。
c113_Battle_Enter_1:
  en: "... Here they come."
  ko: "…온다."
  ja: "…来る。"
c113_Battle_Ready_1:
  en: Stay back. I'll take care of this.
  ko: 물러나 있어. 내가 해결할게.
  ja: 下がってて。私が片付ける。
c113_Battle_Ready_2:
  en: I'll put a stop to all of them.
  ko: 전부 막아 내겠어.
  ja: すべて食い止めてみせる。
c113_Battle_Ready_3:
  en: Locked and loaded. Engaging now.
  ko: 무장 점검 완료. 응전할게.
  ja: 武装点検完了。応戦しよう。
c113_Reload_1:
  en: Reloading.
  ko: 정비하고 갈게.
  ja: 整備してから行く。
c113_Reload_2:
  en: "... This is taking a while. Stay hidden."
  ko: "…전투가 길어지겠네. 몸을 잘 숨기고 있도록 해."
  ja: "…戦闘が長引きそう。しっかり身を隠していて。"
c113_Reload_3:
  en: This body's sturdier than I thought. I like it.
  ko: 니케의 몸은 생각보다 더 튼튼하네. 나쁘지 않아.
  ja: 思ってたよりニケの体は頑丈ね。悪くない。
c113_Ult_Skill_Ready_1:
  en: I've got this.
  ko: 내가 갈게.
  ja: 私が行く。
c113_Ult_Skill_1:
  en: Just gotta do my best. No shortcuts.
  ko: 빠른 길은 없어, 최선을 다할 뿐이야.
  ja: 近道などない、全力を尽くすのみ。
c113_FullBurst_1:
  en: Now...!
  ko: 지금이야…!
  ja: 今だ…！
c113_Kill_Monster_1:
  en: Clear.
  ko: 클리어.
  ja: クリア。
c113_Kill_Monster_2:
  en: Good.
  ko: 좋아.
  ja: よし。
c113_Kill_Monster_3:
  en: Next.
  ko: 다음.
  ja: 次。
c113_Damage_1:
  en: Agh.
  ko: 읏.
  ja: うっ。
c113_Damage_2:
  en: Ugh.
  ko: "…칫."
  ja: "…チッ。"
c113_Damage_3:
  en: Not good.
  ko: 좋지 않네.
  ja: まずい。
c113_Die_1:
  en: Sorry... I just need a little maintenance.
  ko: 미안… 잠시만 정비하고 올게.
  ja: ごめん…少し整備してくる。
c113_Win_1:
  en: The way's clear now. Let's go.
  ko: 이제 방해물은 없어. 가자.
  ja: もう障害はない。行こう。
